# PoS version compatibility matrix — curated list of EL + CL versions to test.
#
# The pos-e2e workflow reads this file to generate pairwise compat pairs.
# Only versions listed under `versions` are tested. Keep this list focused:
#   - Versions actively running in production
#   - Release candidates being validated for rollout
#   - Remove versions once fully deprecated and no longer in use
#
# Each entry must have: image, a type discriminator, and reason.
#   - EL entries:  el_type: bor | erigon
#   - CL entries:  cl_type: heimdall-v2
# Pairwise EL pairs are generated across ALL el_type entries (bor-bor,
# erigon-erigon, and bor-erigon cross-client combinations).
# Heimdall-v2 entries drive a separate `pos-heimdall-regression` matrix that
# pins bor+erigon to latest and varies only the CL image — this isolates
# heimdall-v2 as the regression variable.
#
# Heimdall-v2 minimum version policy: only v0.6.0 and later are supported.
# Earlier heimdall-v2 versions are intentionally excluded (pre-GA / not
# production-bound); entries below that floor are silently dropped by the
# workflow filter, so there is no need to maintain exclusions for them.
#
# If this file is absent or `versions` is empty, the workflow falls back
# to auto-detecting the latest bor release from each major.minor line and
# the latest heimdall-v2 release (>= v0.6.0).

versions:
- image: 0xpolygon/bor:2.7.1
  el_type: bor
  reason: latest stable release (2.7 line), single-version baseline
- image: 0xpolygon/bor:2.7.1-beta
  el_type: bor
  reason: latest pre-release (2.7 line), single-version baseline
- image: 0xpolygon/bor:2.6.5
  el_type: bor
  reason: latest stable release (2.6 line), previous minor-line coverage
- image: 0xpolygon/erigon:v3.5.0
  el_type: erigon
  reason: latest stable release (3.5 line)
- image: 0xpolygon/erigon:v3.4.0
  el_type: erigon
  reason: new stable release (3.4 line), auto-detected
- image: 0xpolygon/heimdall-v2:0.6.0
  cl_type: heimdall-v2
  reason: latest stable release (0.6 line), regression baseline (min supported)

# Excluded version pairs — combinations known to fail due to precompile or EVM
# behavior differences. These are skipped during pairwise matrix generation.
#
# Rule: latest + second-latest bor pairs must NEVER be excluded — rolling
# upgrades between adjacent releases must always work.
#
# Each entry needs: images (list of 2), reason, and link (CI run with failure).
# Optional: scope (default: "all") — restrict exclusion to a specific job:
#   - "all": excluded from every job (default if omitted)
#   - "fork-transition": excluded only from pos-fork-transition
excluded_pairs:
- images:
    - 0xpolygon/bor:2.6.5
    - 0xpolygon/erigon:v3.5.0
  reason: >-
    Erigon v3.5.0 cannot sync past the Lisovo fork (block 512) when bor-2.6.5
    validators are producing blocks. The cross-client oracle detects a 128-block gap
    (Erigon stuck at 511, Bor at 639); blocks at the Lisovo activation boundary
    from bor-2.6.5 are rejected by Erigon v3.5.0.
  link: https://github.com/agglayer/e2e/actions/runs/23782039592/job/69296808463
- images:
    - 0xpolygon/bor:2.6.5
    - 0xpolygon/bor:2.7.1-beta
  scope: fork-transition
  reason: >-
    Consensus-breaking changes between bor 2.6.x and 2.7.0 cause state-root
    divergence in mixed-version devnets: block-STM finalStateDB bug fix
    (0xPolygon/bor#2137), KZG precompile restoration for madhugiri
    (0xPolygon/bor#2140), and EVM interrupt propagation fix (0xPolygon/bor#2092).
    With 3 validators needing Tendermint >2/3 unanimity, Heimdall cannot commit
    span 5 and the chain halts at block 639 (span 4 end). Fork-transition EL
    tests pass (exec-specs keeps this pair); only span-dependent Heimdall tests
    are affected.
  link: https://github.com/agglayer/e2e/actions/runs/23782039592
- images:
    - 0xpolygon/bor:2.6.5
    - 0xpolygon/bor:2.7.1
  scope: fork-transition
  reason: >-
    Same consensus-breaking changes as the 2.6.5 ↔ 2.7.1-beta pair apply to
    the stable release: block-STM finalStateDB bug fix (0xPolygon/bor#2137),
    KZG precompile restoration (0xPolygon/bor#2140), and EVM interrupt
    propagation fix (0xPolygon/bor#2092). Chain halts at block 639 (span 4 end)
    because Heimdall cannot commit span 5 with state-root divergence across
    mixed-version validators. Fork-transition EL tests pass (exec-specs keeps
    this pair); only span-dependent Heimdall tests are affected.
  link: https://github.com/agglayer/e2e/actions/runs/23782039592
