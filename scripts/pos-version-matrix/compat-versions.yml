# PoS version compatibility matrix — curated list of EL versions to test.
#
# The pos-e2e workflow reads this file to generate pairwise compat pairs.
# Only versions listed under `versions` are tested. Keep this list focused:
#   - Versions actively running in production
#   - Release candidates being validated for rollout
#   - Remove versions once fully deprecated and no longer in use
#
# Each entry must have: image, el_type (bor or erigon), reason.
# Pairwise pairs are generated across ALL entries (bor-bor, erigon-erigon,
# and bor-erigon cross-client combinations).
#
# If this file is absent or `versions` is empty, the workflow falls back
# to auto-detecting the latest bor release from each major.minor line.

versions:
- image: 0xpolygon/bor:2.6.5
  el_type: bor
  reason: latest stable release (2.6 line)
- image: 0xpolygon/bor:2.5.9
  el_type: bor
  reason: latest stable release (2.5 line)
- image: 0xpolygon/erigon:v3.4.0
  el_type: erigon
  reason: new stable release (3.4 line), auto-detected
- image: 0xpolygon/erigon:v3.3.7
  el_type: erigon
  reason: new stable release (3.3 line), auto-detected
- image: 0xpolygon/bor:2.7.0
  el_type: bor
  reason: new stable release (2.7 line), auto-detected
- image: 0xpolygon/erigon:v3.5.0
  el_type: erigon
  reason: new stable release (3.5 line), auto-detected

# Excluded version pairs — combinations known to fail due to precompile or EVM
# behavior differences across major versions. These are skipped during pairwise
# matrix generation to avoid wasting CI resources on expected failures.
#
# Rule: always keep latest + second-latest release pairs — rolling upgrades
# across adjacent major versions must always work.
#
# Each entry needs: images (list of 2), reason, and link (CI run with failure).
excluded_pairs:
- images:
    - 0xpolygon/bor:2.7.0
    - 0xpolygon/bor:2.5.9
  reason: >-
    EVM behavior mismatch across 2 major versions (2.7 vs 2.5). Execution-specs
    tests fail due to precompile and fork activation differences when validators
    run incompatible versions.
  link: https://github.com/agglayer/e2e/actions/runs/23532924942/job/68627382271
- images:
    - 0xpolygon/bor:2.6.5
    - 0xpolygon/bor:2.5.9
  reason: >-
    EVM behavior mismatch (2.6 vs 2.5). Fork-transition tests hit BAD BLOCK
    errors on archive sync; execution-specs tests fail due to inconsistent
    precompile behavior across validators.
  link: https://github.com/agglayer/e2e/actions/runs/23532924942/job/68627382263
