# PoS version compatibility matrix — curated list of bor versions to test.
#
# The pos-e2e workflow reads this file to generate pairwise compat pairs.
# Only versions listed under `versions` are tested. Keep this list focused:
#   - Versions actively running in production
#   - Release candidates being validated for rollout
#   - Remove versions once fully deprecated and no longer in use
#
# If this file is absent or `versions` is empty, the workflow falls back
# to auto-detecting the latest release from each major.minor line.

versions:
  # Latest pre-release — validating for next rollout
  - image: "0xpolygon/bor:2.7.0-beta3"
    reason: "latest pre-release, validating for production"

  # Current stable — running in production
  - image: "0xpolygon/bor:2.6.5"
    reason: "latest 2.6.x stable, active in production"

  # Recent 2.6.x patches — validators may still be on these
  - image: "0xpolygon/bor:2.6.3"
    reason: "recent 2.6.x patch, still running on some validators"

  - image: "0xpolygon/bor:2.6.2"
    reason: "recent 2.6.x patch, kurtosis-pos default image"

  # Previous stable line
  - image: "0xpolygon/bor:2.5.9"
    reason: "latest 2.5.x stable, still active on some nodes"

# Versions explicitly excluded from testing.
excluded_versions:
  bor:
    # Add entries here as: "<version>": "<reason>"
    {}
