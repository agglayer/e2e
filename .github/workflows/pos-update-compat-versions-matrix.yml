name: Update PoS Compat Versions
run-name: Check for new bor/erigon releases

on:
  schedule:
    # Check daily at 04:00 UTC (before the pos-e2e run at 06:00).
    - cron: "0 4 * * *"

  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-compat-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install -q requests PyYAML

      - name: Check for new releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          output=$(python3 scripts/pos-version-matrix/update-compat-versions.py 2>&1)
          echo "$output"

          if git diff --quiet scripts/pos-version-matrix/compat-versions.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "--- Diff ---"
            git diff scripts/pos-version-matrix/compat-versions.yml
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: auto/update-compat-versions
          commit-message: "chore: update compat-versions.yml with new releases"
          title: "chore: update PoS compat versions with new releases"
          body: |
            New bor/erigon releases detected. This PR adds them to compat-versions.yml.

            **Review before merging** — remove any versions that should not be tested and verify the pair count is reasonable.
          base: main
