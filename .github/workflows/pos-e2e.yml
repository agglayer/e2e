name: PoS E2E Tests
run-name: PoS E2E tests (${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}) — bor:${{ inputs.bor-latest-image || 'latest release' }}

on:
  schedule:
    # Poll for new bor releases once a day at 06:00 UTC.
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      bor-latest-image:
        description: "Bor image for validators and execution-specs tests. Leave empty to auto-detect from GitHub releases."
        required: false
        type: string
        default: ""
      bor-previous-image:
        description: "Previous major bor image (different major.minor). Leave empty to auto-detect."
        required: false
        type: string
        default: ""
      heimdall-v2-image:
        description: "Heimdall-v2 image. Leave empty to auto-detect from GitHub releases."
        required: false
        type: string
        default: ""
      erigon-image:
        description: "Erigon image. Leave empty to auto-detect from GitHub releases."
        required: false
        type: string
        default: ""
      bor-archive-image:
        description: "Bor image for the archive sync node. Leave empty to use bor-latest. Set to a different version to test cross-version archive sync."
        required: false
        type: string
        default: ""
      bor-compat-versions:
        description: "Comma-separated bor images for pairwise version compat matrix. Leave empty to auto-detect from recent major.minor lines."
        required: false
        type: string
        default: ""
      kurtosis-pos-ref:
        description: "Tag, branch, or commit of kurtosis-pos to use."
        required: false
        type: string
        default: "feat/execution-specs"
      ethereum-exec-specs-ref:
        description: "Branch or tag of ethereum/execution-specs to use for remote execution tests."
        required: false
        type: string
        default: "forks/amsterdam"
      run-tests:
        description: "Select which test jobs to run (bypasses release detection for the selected jobs)."
        required: false
        type: choice
        default: "all"
        options:
          - all
          - pos-exec-specs
          - fork-trans
          - matrix
          - ethereum-exec-specs-remote
      force-run:
        description: "Run tests even if no new bor release is detected"
        required: false
        type: boolean
        default: false

concurrency:
  group: pos-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  id-token: write

env:
  ENCLAVE_NAME: pos
  POLYCLI_VERSION: v0.1.103
  KURTOSIS_POS_REF: ${{ inputs.kurtosis-pos-ref || 'feat/execution-specs' }}
  EXEC_SPECS_REF: ${{ inputs.ethereum-exec-specs-ref || 'forks/amsterdam' }}
  # Suppress Node.js 20 deprecation warnings from third-party actions
  # (bats-action, setup-uv, etc.). Actions will be forced to Node 24 by
  # default starting June 2nd 2026; opt in early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Resolve bor/heimdall versions and check for new releases.
  # ---------------------------------------------------------------------------
  check-new-release:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.decide.outputs.should-run }}
      bor-tag: ${{ steps.resolve.outputs.bor-tag }}
      bor-latest-image: ${{ steps.resolve.outputs.bor-latest-image }}
      bor-previous-image: ${{ steps.resolve.outputs.bor-previous-image }}
      bor-archive-image: ${{ steps.resolve.outputs.bor-archive-image }}
      heimdall-v2-image: ${{ steps.resolve.outputs.heimdall-v2-image }}
      erigon-image: ${{ steps.resolve.outputs.erigon-image }}
      compat-pairs: ${{ steps.gen-compat-matrix.outputs.compat-pairs }}
    steps:
      - name: Checkout (for compat-versions.yml)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          sparse-checkout: scripts/pos-version-matrix
          sparse-checkout-cone-mode: false

      - name: Resolve bor and heimdall-v2 versions
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --- Manual dispatch with explicit images --------------------------
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.bor-latest-image }}" ]]; then
            echo "Manual dispatch with explicit images."
            echo "bor-tag=manual" >> "$GITHUB_OUTPUT"
            echo "bor-latest-image=${{ inputs.bor-latest-image }}" >> "$GITHUB_OUTPUT"
            echo "bor-previous-image=${{ inputs.bor-previous-image }}" >> "$GITHUB_OUTPUT"
            echo "heimdall-v2-image=${{ inputs.heimdall-v2-image }}" >> "$GITHUB_OUTPUT"
            if [[ -n "${{ inputs.erigon-image }}" ]]; then
              echo "erigon-image=${{ inputs.erigon-image }}" >> "$GITHUB_OUTPUT"
            else
              _eri_tag=$(gh api repos/0xPolygon/erigon/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
              if [[ -n "$_eri_tag" ]]; then
                echo "erigon-image=0xpolygon/erigon:${_eri_tag}" >> "$GITHUB_OUTPUT"
              else
                echo "::warning::Failed to fetch erigon release, using 'latest'."
                echo "erigon-image=0xpolygon/erigon:latest" >> "$GITHUB_OUTPUT"
              fi
            fi
            echo "bor-archive-image=${{ inputs.bor-archive-image || inputs.bor-latest-image }}" >> "$GITHUB_OUTPUT"

            if [[ -n "${{ inputs.bor-compat-versions }}" ]]; then
              echo "compat-versions-override=${{ inputs.bor-compat-versions }}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # --- Auto-detect bor versions from GitHub releases -----------------
          # Fetch recent releases (non-draft) and sort by semantic version
          # (not creation date). This ensures v2.7.0-beta2 ranks above v2.6.5
          # even if the patch was released later.
          echo "Fetching bor releases..."
          all_tags=$(gh api repos/0xPolygon/bor/releases --paginate --jq \
            '.[] | select(.draft == false) | .tag_name' 2>/dev/null | head -50)

          if [[ -z "$all_tags" ]]; then
            echo "::warning::Failed to fetch bor releases."
            echo "bor-tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Filter to valid version tags (vX.Y.Z with optional suffix like -beta2).
          # Excludes one-off test tags like v2.8.0-test1.
          version_tags=$(echo "$all_tags" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-beta[0-9]*|-rc[0-9]*)?$' || true)
          if [[ -z "$version_tags" ]]; then
            echo "::warning::No valid bor version tags found, falling back to all releases."
            version_tags="$all_tags"
          fi

          # Sort by semantic version (descending). Converts tags to a sortable
          # format: major.minor.patch.suffix_weight.suffix_num, then sorts
          # numerically. beta < rc < stable (weights: beta=1, rc=2, stable=3).
          sorted_tags=$(echo "$version_tags" | while IFS= read -r tag; do
            # Strip v prefix and split into base version and suffix.
            ver="${tag#v}"
            base=$(echo "$ver" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
            suffix=$(echo "$ver" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+//' | sed 's/^-//')

            major=$(echo "$base" | cut -d. -f1)
            minor=$(echo "$base" | cut -d. -f2)
            patch=$(echo "$base" | cut -d. -f3)

            if [[ -z "$suffix" ]]; then
              weight=3; suffix_num=0  # stable
            elif [[ "$suffix" == rc* ]]; then
              weight=2; suffix_num=$(echo "$suffix" | sed 's/rc//' | sed 's/^$/0/')
            elif [[ "$suffix" == beta* ]]; then
              weight=1; suffix_num=$(echo "$suffix" | sed 's/beta//' | sed 's/^$/0/')
            else
              weight=0; suffix_num=0
            fi

            printf "%04d.%04d.%04d.%d.%04d %s\n" "$major" "$minor" "$patch" "$weight" "$suffix_num" "$tag"
          done | sort -t. -k1,1rn -k2,2rn -k3,3rn -k4,4rn -k5,5rn | awk '{print $2}')

          echo "Sorted tags (highest version first):"
          echo "$sorted_tags" | head -10

          latest_tag=$(echo "$sorted_tags" | head -1)
          echo "Latest bor tag: $latest_tag"

          # Find the previous major release (first tag with a different major.minor)
          # for legacy outputs (bor-latest-image / bor-previous-image).
          latest_major_minor=$(echo "$latest_tag" | sed -E 's/^v([0-9]+\.[0-9]+)\..*/\1/')
          previous_tag="$latest_tag"
          while IFS= read -r tag; do
            tag_mm=$(echo "$tag" | sed -E 's/^v([0-9]+\.[0-9]+)\..*/\1/')
            if [[ "$tag_mm" != "$latest_major_minor" ]]; then
              previous_tag="$tag"
              break
            fi
          done <<< "$sorted_tags"

          # Convert tags to docker images: v2.7.0 -> 0xpolygon/bor:2.7.0
          echo "bor-tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "bor-latest-image=0xpolygon/bor:${latest_tag#v}" >> "$GITHUB_OUTPUT"
          echo "bor-previous-image=0xpolygon/bor:${previous_tag#v}" >> "$GITHUB_OUTPUT"

          # --- Auto-detect heimdall-v2 version -------------------------------
          if [[ -n "${{ inputs.heimdall-v2-image }}" ]]; then
            echo "heimdall-v2-image=${{ inputs.heimdall-v2-image }}" >> "$GITHUB_OUTPUT"
          else
            hv2_tag=$(gh api repos/0xPolygon/heimdall-v2/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [[ -n "$hv2_tag" ]]; then
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:${hv2_tag#v}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch heimdall-v2 release, using 'latest'."
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

          # --- Auto-detect erigon version ------------------------------------
          # Note: unlike bor/heimdall which strip the 'v' prefix, erigon Docker
          # Hub images retain it (e.g. 0xpolygon/erigon:v3.5.0), so we use
          # ${erigon_tag} directly without the #v strip.
          if [[ -n "${{ inputs.erigon-image }}" ]]; then
            echo "erigon-image=${{ inputs.erigon-image }}" >> "$GITHUB_OUTPUT"
          else
            erigon_tag=$(gh api repos/0xPolygon/erigon/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [[ -n "$erigon_tag" ]]; then
              echo "erigon-image=0xpolygon/erigon:${erigon_tag}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch erigon release, using 'latest'."
              echo "erigon-image=0xpolygon/erigon:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

          # --- Archive node image -----------------------------------------
          # Defaults to bor-latest unless explicitly overridden via input.
          if [[ -n "${{ inputs.bor-archive-image }}" ]]; then
            echo "bor-archive-image=${{ inputs.bor-archive-image }}" >> "$GITHUB_OUTPUT"
          else
            echo "bor-archive-image=0xpolygon/bor:${latest_tag#v}" >> "$GITHUB_OUTPUT"
          fi

          # --- Build compat version list for pairwise testing -------------------
          # Priority: 1) workflow input override, 2) curated compat-versions.yml,
          # 3) auto-detect fallback (latest + previous).
          COMPAT_YML="scripts/pos-version-matrix/compat-versions.yml"

          # The compat-versions.yml and pair generation are handled entirely
          # in the gen-compat-matrix step. We just pass through manual overrides.
          if [[ -n "${{ inputs.bor-compat-versions }}" ]]; then
            echo "compat-versions-override=${{ inputs.bor-compat-versions }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check cache for previously tested tag
        if: steps.resolve.outputs.bor-tag != 'manual' && steps.resolve.outputs.bor-tag != ''
        id: cache-check
        uses: actions/cache@v5
        with:
          path: /tmp/pos-release-cache
          key: pos-e2e-bor-release-${{ steps.resolve.outputs.bor-tag }}

      - name: Determine if tests should run
        id: decide
        run: |
          if [[ -z "${{ steps.resolve.outputs.bor-tag }}" ]]; then
            echo "No bor tag resolved — skipping."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force-run }}" == "true" ]]; then
            echo "Force-run requested."
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.resolve.outputs.bor-tag }}" == "manual" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.cache-check.outputs.cache-hit }}" == "true" ]]; then
            echo "Tag ${{ steps.resolve.outputs.bor-tag }} already tested — skipping."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected: ${{ steps.resolve.outputs.bor-tag }}"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate version compatibility matrix
        id: gen-compat-matrix
        run: |
          COMPAT_YML="scripts/pos-version-matrix/compat-versions.yml"

          # --- Collect bor and erigon version lists ---
          # YAML has flat `versions:` list with `el_type: bor|erigon` discriminator.
          declare -a bor_images=()
          declare -a erigon_images=()
          OVERRIDE="${{ steps.resolve.outputs.compat-versions-override }}"
          ERIGON_OVERRIDE="${{ inputs.erigon-image }}"

          if [[ -n "$OVERRIDE" ]]; then
            echo "Using manual override for bor versions."
            IFS=',' read -ra bor_images <<< "$OVERRIDE"
          fi

          if [[ -n "$ERIGON_OVERRIDE" ]]; then
            echo "Using manual override for erigon: ${ERIGON_OVERRIDE}"
            erigon_images=("$ERIGON_OVERRIDE")
          fi

          if [[ -z "$OVERRIDE" || -z "$ERIGON_OVERRIDE" ]] && [[ -f "$COMPAT_YML" ]]; then
            echo "Reading versions from ${COMPAT_YML}..."
            pending_img=""
            while IFS= read -r line; do
              if [[ "$line" =~ image:\ *\"?([^\"[:space:]]+)\"? ]]; then
                [[ -n "$pending_img" ]] && echo "::warning::Skipped image without el_type: ${pending_img}"
                pending_img="${BASH_REMATCH[1]}"
              elif [[ -n "$pending_img" && "$line" =~ el_type:\ *(bor|erigon) ]]; then
                el_type="${BASH_REMATCH[1]}"
                [[ "$el_type" == "bor" && -z "$OVERRIDE" ]] && bor_images+=("$pending_img")
                [[ "$el_type" == "erigon" && -z "$ERIGON_OVERRIDE" ]] && erigon_images+=("$pending_img")
                pending_img=""
              fi
            done < "$COMPAT_YML"
          fi

          # Fallback: auto-detect latest + previous bor.
          if [[ ${#bor_images[@]} -eq 0 ]]; then
            echo "No bor versions found. Falling back to auto-detect."
            latest="${{ steps.resolve.outputs.bor-latest-image }}"
            previous="${{ steps.resolve.outputs.bor-previous-image }}"
            [[ -n "$latest" ]] && bor_images+=("$latest")
            [[ -n "$previous" && "$previous" != "$latest" ]] && bor_images+=("$previous")
          fi

          # Fallback: auto-detected erigon from resolve step.
          if [[ ${#erigon_images[@]} -eq 0 ]]; then
            erigon_fallback="${{ steps.resolve.outputs.erigon-image }}"
            if [[ -n "$erigon_fallback" ]]; then
              echo "No erigon versions in YAML — using auto-detected fallback: ${erigon_fallback}"
              erigon_images=("$erigon_fallback")
            fi
          fi

          echo "Bor versions (${#bor_images[@]}):"
          printf '  %s\n' "${bor_images[@]}"
          echo "Erigon versions (${#erigon_images[@]}):"
          printf '  %s\n' "${erigon_images[@]}"

          # --- Parse excluded pairs from compat-versions.yml ---
          declare -A excluded_set
          excluded_json="[]"
          if [[ -f "$COMPAT_YML" ]]; then
            in_excluded=false
            img_buf=()
            reason_buf=""
            link_buf=""
            in_folded_reason=false
            while IFS= read -r line; do
              if [[ "$line" =~ ^excluded_pairs: ]]; then
                in_excluded=true; continue
              fi
              [[ "$in_excluded" != "true" ]] && continue
              if [[ "$line" =~ ^[a-zA-Z] ]]; then break; fi
              if [[ "$line" =~ ^-\ +images: ]]; then
                # Flush previous entry if complete.
                if [[ ${#img_buf[@]} -eq 2 ]]; then
                  excluded_set["${img_buf[0]}|${img_buf[1]}"]=1
                  excluded_set["${img_buf[1]}|${img_buf[0]}"]=1
                  excluded_json=$(echo "$excluded_json" | jq -c \
                    --arg a "${img_buf[0]}" --arg b "${img_buf[1]}" \
                    --arg r "$reason_buf" --arg l "$link_buf" \
                    '. + [{"a":$a,"b":$b,"reason":$r,"link":$l}]')
                  echo "  Excluded pair: ${img_buf[0]} <-> ${img_buf[1]}"
                elif [[ ${#img_buf[@]} -gt 0 ]]; then
                  echo "::warning::Incomplete excluded pair (only ${#img_buf[@]} image(s)): ${img_buf[*]}"
                fi
                img_buf=(); reason_buf=""; link_buf=""; in_folded_reason=false; continue
              fi
              if [[ "$line" =~ ^[[:space:]]+-\ +(.+)$ ]]; then
                img=$(echo "${BASH_REMATCH[1]}" | sed 's/^["'"'"']//; s/["'"'"']$//; s/[[:space:]]*$//')
                img_buf+=("$img")
              fi
              if [[ "$line" =~ ^[[:space:]]+reason:\ *(.+)$ ]]; then
                _r="${BASH_REMATCH[1]}"
                # Strip YAML block scalar indicators (>-, >, |) from inline value.
                case "$_r" in ">-"|">"|"|") reason_buf=""; in_folded_reason=true ;; *) reason_buf="$_r"; in_folded_reason=false ;; esac
              fi
              if [[ "$line" =~ ^[[:space:]]+link:\ *(.+)$ ]]; then
                link_buf="${BASH_REMATCH[1]}"
              fi
              # Continuation lines for multi-line reason (YAML >- folded scalar).
              if [[ "$in_folded_reason" == "true" || ( -n "$reason_buf" ) ]] && \
                 [[ "$line" =~ ^[[:space:]]{4,}[^[:space:]] ]] && \
                 [[ ! "$line" =~ ^[[:space:]]+(images|reason|link|-) ]]; then
                reason_buf="${reason_buf:+${reason_buf} }$(echo "$line" | sed 's/^[[:space:]]*//')"
              fi
            done < "$COMPAT_YML"
            # Flush last entry.
            if [[ ${#img_buf[@]} -eq 2 ]]; then
              excluded_set["${img_buf[0]}|${img_buf[1]}"]=1
              excluded_set["${img_buf[1]}|${img_buf[0]}"]=1
              excluded_json=$(echo "$excluded_json" | jq -c \
                --arg a "${img_buf[0]}" --arg b "${img_buf[1]}" \
                --arg r "$reason_buf" --arg l "$link_buf" \
                '. + [{"a":$a,"b":$b,"reason":$r,"link":$l}]')
              echo "  Excluded pair: ${img_buf[0]} <-> ${img_buf[1]}"
            elif [[ ${#img_buf[@]} -gt 0 ]]; then
              echo "::warning::Incomplete excluded pair at end of file (${#img_buf[@]} image(s)): ${img_buf[*]}"
            fi
            echo "Loaded $(echo "$excluded_json" | jq length) excluded pairs."
          fi
          echo "excluded-pairs=${excluded_json}" >> "$GITHUB_OUTPUT"

          # --- Generate test scenarios ---
          # 1) Single-version baseline: all latest bor + latest erigon RPC
          # 2) Pairwise bor mixes: validators split + erigon cross-client RPC
          erigon_latest="${erigon_images[0]:-}"
          if [[ -z "$erigon_latest" ]]; then
            echo "::warning::No erigon images found — erigon_rpc will be empty in scenarios."
          fi
          scenarios="[]"

          # Single-version baseline (latest bor + latest erigon).
          if [[ ${#bor_images[@]} -gt 0 ]]; then
            la=$(echo "${bor_images[0]}" | sed 's|.*/||; s/:/-/g')
            scenarios=$(echo "$scenarios" | jq -c \
              --arg va "${bor_images[0]}" --arg vb "${bor_images[0]}" \
              --arg eri "$erigon_latest" --arg lbl "${la}-single" \
              '. + [{"bor_a":$va,"bor_b":$vb,"erigon_rpc":$eri,"pair_label":$lbl}]')
          fi

          # Pairwise bor-bor mixes: always pin one side to the latest (index 0).
          # This avoids generating stale cross-minor combinations (e.g. 2.7.0 vs
          # 2.6.5) that don't reflect a realistic production state — any failure
          # there would be resolved by upgrading, not by holding back older nodes.
          # excluded_pairs applies to both bor-bor and bor-erigon combinations:
          # if the selected erigon is excluded with either bor version, rotate to
          # the next erigon version until a compatible one is found.
          va="${bor_images[0]}"
          la=$(echo "$va" | sed 's|.*/||; s/:/-/g')
          for ((j=1; j<${#bor_images[@]}; j++)); do
            vb="${bor_images[$j]}"
            if [[ -n "${excluded_set["${va}|${vb}"]:-}" ]]; then
              echo "  Skipping excluded pair: ${va} <-> ${vb}"
              continue
            fi
            lb=$(echo "$vb" | sed 's|.*/||; s/:/-/g')
            if [[ ${#erigon_images[@]} -gt 0 ]]; then
              # Always start with the latest erigon (index 0) and rotate only if
              # it is excluded with va or vb.  Starting from j%N caused an
              # off-by-one that assigned erigon[1] (older) to the most important
              # pair (latest vs second-latest) even when erigon[0] is compatible.
              eri="${erigon_images[0]}"
              # Rotate past any erigon version excluded with va or vb.
              for ((k=1; k<${#erigon_images[@]}; k++)); do
                [[ -z "${excluded_set["${va}|${eri}"]:-}" && -z "${excluded_set["${vb}|${eri}"]:-}" ]] && break
                eri="${erigon_images[$(( k % ${#erigon_images[@]} ))]}"
                echo "  Rotated erigon to ${eri} (excluded pair avoided for ${va} or ${vb})"
              done
            else
              eri="$erigon_latest"
            fi
            # Guard: if the final eri is still excluded, skip this pair.
            if [[ ${#erigon_images[@]} -gt 0 ]] && \
               { [[ -n "${excluded_set["${va}|${eri}"]:-}" ]] || \
                 [[ -n "${excluded_set["${vb}|${eri}"]:-}" ]]; }; then
              echo "::warning::No compatible erigon for bor pair ${va} <-> ${vb} — all versions excluded, skipping."
              continue
            fi
            scenarios=$(echo "$scenarios" | jq -c \
              --arg va "$va" --arg vb "$vb" --arg eri "$eri" --arg lbl "${la}-vs-${lb}" \
              '. + [{"bor_a":$va,"bor_b":$vb,"erigon_rpc":$eri,"pair_label":$lbl}]')
          done

          echo "compat-pairs=${scenarios}" >> "$GITHUB_OUTPUT"
          echo "Test scenarios ($(echo "$scenarios" | jq length)):"
          echo "$scenarios" | jq -r '.[] | "  \(.pair_label)  erigon=\(.erigon_rpc)"'

      - name: Summary
        run: |
          {
            echo "### PoS E2E Release Check"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Bor latest | \`${{ steps.resolve.outputs.bor-latest-image }}\` |"
            echo "| Bor previous | \`${{ steps.resolve.outputs.bor-previous-image }}\` |"
            echo "| Bor archive | \`${{ steps.resolve.outputs.bor-archive-image }}\` |"
            echo "| Heimdall-v2 | \`${{ steps.resolve.outputs.heimdall-v2-image }}\` |"
            echo "| Erigon | \`${{ steps.resolve.outputs.erigon-image }}\` |"
            echo "| Should run | \`${{ steps.decide.outputs.should-run }}\` |"
            echo ""
            echo "#### Test Matrix"
            echo '${{ steps.gen-compat-matrix.outputs.compat-pairs }}' | jq -r '
              if length == 0 then "No compat pairs generated."
              else
                "| Pair | Bor A | Bor B | Erigon |",
                "|------|-------|-------|--------|",
                (.[] | "| \(.pair_label) | `\(.bor_a)` | `\(.bor_b)` | `\(.erigon_rpc)` |")
              end'
            echo ""
            excluded='${{ steps.gen-compat-matrix.outputs.excluded-pairs }}'
            if [[ $(echo "$excluded" | jq 'length') -gt 0 ]]; then
              echo "#### Excluded Pairs (Known Incompatible)"
              echo ""
              echo "| Version A | Version B | Reason |"
              echo "|-----------|-----------|--------|"
              echo "$excluded" | jq -r '.[] | "| `\(.a)` | `\(.b)` | \(.reason) |"'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # PoS E2E tests — unified matrix of devnet configurations.
  #
  # Each scenario deploys a mixed-version devnet with bor validators split
  # across versions, a bor RPC, and an erigon cross-client RPC.
  # Staggered fork activation from kurtosis-pos constants.star defaults.
  #
  # Tests: fork-transition (parallel, during fork activation) followed by
  # execution-specs (after all forks active past block 640).
  # ---------------------------------------------------------------------------
  # Job 1: Execution-specs — staggered forks (256–640), stable basefee.
  # ---------------------------------------------------------------------------
  pos-execution-specs:
    needs: check-new-release
    if: >-
      needs.check-new-release.outputs.compat-pairs != '[]' && (
        (github.event_name == 'schedule' && needs.check-new-release.outputs.should-run == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.run-tests == 'all' || inputs.run-tests == 'pos-exec-specs' || inputs.run-tests == 'matrix'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include: ${{ fromJson(needs.check-new-release.outputs.compat-pairs) }}
    name: pos-exec-specs (${{ matrix.pair_label }})
    steps:
      - name: Checkout agglayer/e2e
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli jq
          kurtosis analytics disable

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1.7.0
        with:
          cache: false

      - name: Install bats
        uses: bats-core/bats-action@3.0.0

      - name: Install polycli
        run: |
          tmp_dir=$(mktemp -d)
          curl -sL "https://github.com/0xPolygon/polygon-cli/releases/download/${{ env.POLYCLI_VERSION }}/polycli_${{ env.POLYCLI_VERSION }}_linux_amd64.tar.gz" | tar -xz -C "$tmp_dir"
          mv "$tmp_dir"/* /usr/local/bin/polycli
          rm -rf "$tmp_dir"
          chmod +x /usr/local/bin/polycli
          polycli version

      - name: Checkout kurtosis-pos
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Compute minimum and maximum bor version in the mix
        id: bor-min
        run: |
          ver_a=$(echo "${{ matrix.bor_a }}" | sed 's|.*:||; s/^v//')
          ver_b=$(echo "${{ matrix.bor_b }}" | sed 's|.*:||; s/^v//')
          base_a=$(echo "$ver_a" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          base_b=$(echo "$ver_b" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          min_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | head -1)
          max_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | tail -1)
          echo "bor-min-version=${min_ver}" >> "$GITHUB_OUTPUT"
          echo "bor-max-version=${max_ver}" >> "$GITHUB_OUTPUT"
          echo "Bor version range: ${min_ver} — ${max_ver} (from ${ver_a}, ${ver_b})"

      - name: Patch constants.star (staggered Rio+ schedule, minimum 256)
        run: |
          CONSTANTS="kurtosis-pos/src/config/constants.star"
          BOR_MIN="${{ steps.bor-min.outputs.bor-min-version }}"

          # Helper: check if min version >= required
          ver_gte() {
            [[ "$(printf '%s\n%s' "$BOR_MIN" "$1" | sort -V | head -1)" == "$1" ]]
          }

          # Staggered fork schedule (64-block gaps). This gives each fork
          # enough blocks for historical-state queries, base-fee boundary
          # tests, and the Lisovo→LisovoPro KZG window.
          declare -A FORK_BLOCKS=(
            [rio]=256
            [madhugiri]=320
            [madhugiriPro]=384
            [dandeli]=448
            [lisovo]=512
            [lisovoPro]=576
            [giugliano]=640
          )

          FORKS=(rio)
          ver_gte "2.5.0" && FORKS+=(madhugiri madhugiriPro)
          ver_gte "2.5.6" && FORKS+=(dandeli)
          ver_gte "2.6.0" && FORKS+=(lisovo lisovoPro)
          ver_gte "2.7.0" && FORKS+=(giugliano)

          # Forks NOT supported by the min version must be disabled (set to a
          # block that will never be reached) so the newer bor in the mix does
          # not activate them and cause a consensus split.
          DISABLE=()
          ver_gte "2.7.0" || DISABLE+=(giugliano)
          ver_gte "2.6.0" || DISABLE+=(lisovo lisovoPro)
          ver_gte "2.5.6" || DISABLE+=(dandeli)
          ver_gte "2.5.0" || DISABLE+=(madhugiri madhugiriPro)

          echo "Patching forks for min bor version ${BOR_MIN}: ${FORKS[*]}"
          for fork in "${FORKS[@]}"; do
            block="${FORK_BLOCKS[$fork]}"
            sed -i -E '/^\s+"'"${fork}"'":/s/[0-9]+/'"${block}"'/' "$CONSTANTS"
          done

          if [[ ${#DISABLE[@]} -gt 0 ]]; then
            echo "Disabling unsupported forks for min bor version ${BOR_MIN}: ${DISABLE[*]}"
            for fork in "${DISABLE[@]}"; do
              sed -i -E '/^\s+"'"${fork}"'":/s/[0-9]+/999999999/' "$CONSTANTS"
            done
          fi
          echo "--- Patched EL_HARD_FORK_BLOCKS ---"
          grep -A 20 '^EL_HARD_FORK_BLOCKS' "$CONSTANTS"

          # Write fork schedule env file — single source of truth for test steps.
          declare -A FORK_ENV_MAP=(
            [rio]=FORK_RIO [madhugiri]=FORK_MADHUGIRI [madhugiriPro]=FORK_MADHUGIRI_PRO
            [dandeli]=FORK_DANDELI [lisovo]=FORK_LISOVO [lisovoPro]=FORK_LISOVO_PRO
            [giugliano]=FORK_GIUGLIANO
          )
          {
            echo "# Auto-generated staggered fork schedule"
            echo "FORK_JAIPUR=0"; echo "FORK_DELHI=0"; echo "FORK_INDORE=0"
            echo "FORK_AGRA=0"; echo "FORK_NAPOLI=0"; echo "FORK_AHMEDABAD=0"
            echo "FORK_BHILAI=0"
            for fork in "${FORKS[@]}"; do
              echo "${FORK_ENV_MAP[$fork]}=${FORK_BLOCKS[$fork]}"
            done
            for fork in "${DISABLE[@]}"; do
              echo "${FORK_ENV_MAP[$fork]}=999999999"
            done
          } > /tmp/fork-schedule.env
          echo "--- Fork schedule written ---"
          cat /tmp/fork-schedule.env

      - name: Generate kurtosis params
        run: |
          BOR_A="${{ matrix.bor_a }}"
          BOR_B="${{ matrix.bor_b }}"
          ERIGON_RPC="${{ matrix.erigon_rpc }}"
          HV2_IMAGE="${{ needs.check-new-release.outputs.heimdall-v2-image }}"

          echo "Bor A: ${BOR_A}  |  Bor B: ${BOR_B}  |  Erigon: ${ERIGON_RPC}"

          cat > /tmp/pos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 2
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: validator
                count: 1
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_B}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: erigon
                el_image: "${ERIGON_RPC}"
          PARAMS
          cat /tmp/pos-params.yml

      - name: Deploy kurtosis-pos enclave
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/pos-params.yml .
          popd

      - name: Inspect enclave
        run: kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"

      - name: Wait for all forks to activate
        run: |
          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          RPC_URL="http://${VALIDATOR_RPC}"
          TARGET_BLOCK=654
          MAX_WAIT=900
          POLL_INTERVAL=5
          elapsed=0
          echo "Waiting for block ${TARGET_BLOCK} (last fork at 640)..."
          while [[ "$elapsed" -lt "$MAX_WAIT" ]]; do
            block=$(curl -sf -X POST "${RPC_URL}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              | jq -r '.result // empty' | xargs printf "%d" 2>/dev/null) || block=0
            [[ "$block" -ge "$TARGET_BLOCK" ]] && echo "Block ${block} — all forks active." && exit 0
            echo "[${elapsed}s] Block: ${block} / ${TARGET_BLOCK}"
            sleep "$POLL_INTERVAL"
            elapsed=$(( elapsed + POLL_INTERVAL ))
          done
          echo "::error::Chain stuck at block ${block}."
          exit 1

      - name: Run execution-specs tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # Load fork schedule generated by the Patch constants.star step.
          if [[ -f /tmp/fork-schedule.env ]]; then
            echo "Loading fork schedule from /tmp/fork-schedule.env"
            set -a; source /tmp/fork-schedule.env; set +a
          else
            echo "WARNING: /tmp/fork-schedule.env not found — tests will use _setup_fork_env() defaults"
          fi

          echo "Running execution-specs (${{ matrix.pair_label }})..."
          bats \
            tests/pos/execution-specs/protocol/ \
            tests/pos/execution-specs/evm/ \
            tests/pos/execution-specs/transactions/ \
            tests/pos/execution-specs/rpc/ \
            tests/pos/execution-specs/precompiles/ \
            --filter-tags "execution-specs" \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run resilience tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # Load fork schedule generated by the Patch constants.star step.
          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          fi

          echo "Running resilience tests (${{ matrix.pair_label }})..."
          bats \
            tests/pos/execution-specs/resilience/blockstm-parallel-execution-safety.bats \
            tests/pos/execution-specs/resilience/chain-liveness-under-stress.bats \
            tests/pos/execution-specs/resilience/consensus-finality-edge-cases.bats \
            tests/pos/execution-specs/resilience/rpc-node-stability.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Skipped tests summary
        if: ${{ !cancelled() }}
        run: |
          TAP_FILE="/tmp/bats-tap-output.txt"
          {
            echo "## Skipped Tests Summary (${{ matrix.pair_label }})"
            echo ""
            if [[ ! -f "$TAP_FILE" ]]; then
              echo "_No BATS output captured (tests may not have run)._"
            else
              skipped=$(grep '# skip' "$TAP_FILE" || true)
              if [[ -z "$skipped" ]]; then
                echo "All tests ran — none were skipped."
              else
                echo "| Test | Skip Reason |"
                echo "|------|-------------|"
                while IFS= read -r line; do
                  test_name=$(echo "$line" | sed -E 's/^ok [0-9]+ //' | sed -E 's/ # skip.*$//')
                  reason=$(echo "$line" | sed -E 's/.*# skip (.*)/\1/')
                  echo "| ${test_name} | ${reason} |"
                done <<< "$skipped"
                echo ""
                count=$(echo "$skipped" | wc -l)
                echo "**${count} test(s) skipped** — these represent known version incompatibilities, not failures."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump enclave logs
        if: failure()
        run: kurtosis dump ./dump

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: pos-e2e-dump-execspecs-${{ matrix.pair_label }}-${{ github.run_id }}
          path: ./dump

      - name: Clean up enclave
        if: always()
        run: |
          kurtosis enclave stop "${{ env.ENCLAVE_NAME }}" || true
          kurtosis clean || true

  # ---------------------------------------------------------------------------
  # Job 2: Fork-transition + archive sync — staggered forks.
  # ---------------------------------------------------------------------------
  pos-fork-transition:
    needs: [check-new-release, pos-execution-specs]
    if: >-
      !cancelled() &&
      needs.check-new-release.outputs.compat-pairs != '[]' && (
        (github.event_name == 'schedule' && needs.check-new-release.outputs.should-run == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.run-tests == 'all' || inputs.run-tests == 'fork-trans' || inputs.run-tests == 'matrix'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include: ${{ fromJson(needs.check-new-release.outputs.compat-pairs) }}
    name: fork-trans (${{ matrix.pair_label }})
    steps:
      - name: Checkout agglayer/e2e
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli jq
          kurtosis analytics disable

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1.7.0
        with:
          cache: false

      - name: Install bats
        uses: bats-core/bats-action@3.0.0

      - name: Install polycli
        run: |
          tmp_dir=$(mktemp -d)
          curl -sL "https://github.com/0xPolygon/polygon-cli/releases/download/${{ env.POLYCLI_VERSION }}/polycli_${{ env.POLYCLI_VERSION }}_linux_amd64.tar.gz" | tar -xz -C "$tmp_dir"
          mv "$tmp_dir"/* /usr/local/bin/polycli
          rm -rf "$tmp_dir"
          chmod +x /usr/local/bin/polycli
          polycli version

      - name: Checkout kurtosis-pos
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Generate kurtosis params (staggered forks)
        run: |
          BOR_A="${{ matrix.bor_a }}"
          BOR_B="${{ matrix.bor_b }}"
          ERIGON_RPC="${{ matrix.erigon_rpc }}"
          HV2_IMAGE="${{ needs.check-new-release.outputs.heimdall-v2-image }}"

          echo "Bor A: ${BOR_A}  |  Bor B: ${BOR_B}  |  Erigon: ${ERIGON_RPC}"

          cat > /tmp/pos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 2
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: validator
                count: 1
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_B}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: erigon
                el_image: "${ERIGON_RPC}"
          PARAMS
          cat /tmp/pos-params.yml

      - name: Compute minimum and maximum bor version in the mix
        id: bor-min
        run: |
          ver_a=$(echo "${{ matrix.bor_a }}" | sed 's|.*:||; s/^v//')
          ver_b=$(echo "${{ matrix.bor_b }}" | sed 's|.*:||; s/^v//')
          base_a=$(echo "$ver_a" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          base_b=$(echo "$ver_b" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          min_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | head -1)
          max_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | tail -1)
          echo "bor-min-version=${min_ver}" >> "$GITHUB_OUTPUT"
          echo "bor-max-version=${max_ver}" >> "$GITHUB_OUTPUT"
          echo "Bor version range: ${min_ver} — ${max_ver} (from ${ver_a}, ${ver_b})"

      - name: Patch constants.star (staggered Rio+ schedule, minimum 256)
        run: |
          CONSTANTS="kurtosis-pos/src/config/constants.star"
          BOR_MIN="${{ steps.bor-min.outputs.bor-min-version }}"

          # Helper: check if min version >= required
          ver_gte() {
            [[ "$(printf '%s\n%s' "$BOR_MIN" "$1" | sort -V | head -1)" == "$1" ]]
          }

          # Enforce the staggered fork schedule. All Rio+ forks must activate at
          # >= 256 per bor/heimdall consensus requirement. These values must match
          # the FORK_* env vars used in the BATS tests below.
          # (camelCase patch keys map to SCREAMING_SNAKE BATS vars, e.g.
          #  madhugiriPro -> FORK_MADHUGIRI_PRO, lisovoPro -> FORK_LISOVO_PRO)
          declare -A FORK_BLOCKS=(
            [rio]=256
            [madhugiri]=320
            [madhugiriPro]=384
            [dandeli]=448
            [lisovo]=512
            [lisovoPro]=576
            [giugliano]=640
          )
          PATCH=(rio)
          ver_gte "2.5.0" && PATCH+=(madhugiri madhugiriPro)
          ver_gte "2.5.6" && PATCH+=(dandeli)
          ver_gte "2.6.0" && PATCH+=(lisovo lisovoPro)
          ver_gte "2.7.0" && PATCH+=(giugliano)

          echo "Patching forks for min bor version ${BOR_MIN}: ${PATCH[*]}"
          for fork in "${PATCH[@]}"; do
            block="${FORK_BLOCKS[$fork]}"
            sed -i -E '/^\s+"'"${fork}"'":/s/[0-9]+/'"${block}"'/' "$CONSTANTS"
          done

          # Disable forks not supported by min bor version to prevent consensus splits.
          DISABLE=()
          ver_gte "2.7.0" || DISABLE+=(giugliano)
          ver_gte "2.6.0" || DISABLE+=(lisovo lisovoPro)
          ver_gte "2.5.6" || DISABLE+=(dandeli)
          ver_gte "2.5.0" || DISABLE+=(madhugiri madhugiriPro)
          if [[ ${#DISABLE[@]} -gt 0 ]]; then
            echo "Disabling unsupported forks for min bor version ${BOR_MIN}: ${DISABLE[*]}"
            for fork in "${DISABLE[@]}"; do
              sed -i -E '/^\s+"'"${fork}"'":/s/[0-9]+/999999999/' "$CONSTANTS"
            done
          fi
          echo "--- Patched EL_HARD_FORK_BLOCKS ---"
          grep -A 20 '^EL_HARD_FORK_BLOCKS' "$CONSTANTS"

          # Write fork schedule env file — single source of truth for test steps.
          declare -A FORK_ENV_MAP=(
            [rio]=FORK_RIO [madhugiri]=FORK_MADHUGIRI [madhugiriPro]=FORK_MADHUGIRI_PRO
            [dandeli]=FORK_DANDELI [lisovo]=FORK_LISOVO [lisovoPro]=FORK_LISOVO_PRO
            [giugliano]=FORK_GIUGLIANO
          )
          {
            echo "# Auto-generated staggered fork schedule"
            echo "FORK_JAIPUR=0"; echo "FORK_DELHI=0"; echo "FORK_INDORE=0"
            echo "FORK_AGRA=0"; echo "FORK_NAPOLI=0"; echo "FORK_AHMEDABAD=0"
            echo "FORK_BHILAI=0"
            for fork in "${PATCH[@]}"; do
              echo "${FORK_ENV_MAP[$fork]}=${FORK_BLOCKS[$fork]}"
            done
            for fork in "${DISABLE[@]}"; do
              echo "${FORK_ENV_MAP[$fork]}=999999999"
            done
          } > /tmp/fork-schedule.env
          echo "--- Fork schedule written ---"
          cat /tmp/fork-schedule.env

      - name: Deploy kurtosis-pos enclave (staggered forks)
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/pos-params.yml .
          popd

      - name: Inspect enclave
        run: kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"

      - name: Run fork-transition tests (parallel)
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # Load fork schedule generated by the Patch constants.star step.
          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          else
            echo "WARNING: /tmp/fork-schedule.env not found — tests will use _setup_fork_env() defaults"
          fi

          total_cpus=$(nproc)
          bats_jobs=$(( total_cpus * 2 / 3 ))
          [[ "$bats_jobs" -lt 1 ]] && bats_jobs=1

          echo "Running fork-transition tests (${bats_jobs} jobs) for ${{ matrix.pair_label }}..."
          bats --jobs "$bats_jobs" tests/pos/execution-specs/fork-transitions/parallel-fork-tests.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run cross-client state root oracle tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"
          export ERIGON_RPC_VERSION=$(echo "${{ matrix.erigon_rpc }}" | sed 's|.*:||; s/^v//')

          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          fi

          echo "Running cross-client state root oracle for ${{ matrix.pair_label }}..."
          bats tests/pos/execution-specs/fork-transitions/cross-client-state-roots.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run fork-boundary state consistency tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"
          export BOR_MAX_VERSION="${{ steps.bor-min.outputs.bor-max-version }}"

          echo "Running fork-boundary state consistency for Bor v${BOR_MIN_VERSION}–${BOR_MAX_VERSION} (pair: ${{ matrix.pair_label }})..."
          bats tests/pos/execution-specs/fork-transitions/fork-state-consistency.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run sprint-boundary fork tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # These tests verify fork+sprint boundary intersection using the staggered
          # fork schedule (same devnet as the other tests in this job). The tests
          # skip individual cases when the fork block is not a sprint boundary, so
          # they are safe to run unconditionally against the staggered devnet.
          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          fi

          echo "Running sprint-boundary fork tests for ${{ matrix.pair_label }}..."
          bats tests/pos/execution-specs/fork-transitions/sprint-boundary-fork-tests.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      # -------------------------------------------------------------------
      # Heimdall-v2 consensus correctness tests — run against the live Heimdall
      # REST API (L2_CL_API_URL) to verify span, checkpoint, milestone, and
      # state-sync invariants independently of Bor.
      #
      # Heimdall span 6 starts at block 768.  The fork-transition tests above
      # wait only to the last fork block (640), so the chain may not have
      # advanced far enough for span/state-sync tests. Wait here to ensure
      # the chain has entered span 6 and state-sync events have been produced.
      # -------------------------------------------------------------------
      - name: Wait for chain to reach span 6 (block 768)
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a

          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          RPC_URL="http://${VALIDATOR_RPC}"
          TARGET_BLOCK=780
          MAX_WAIT=900
          POLL_INTERVAL=5
          elapsed=0
          echo "Waiting for block ${TARGET_BLOCK} (span 6 starts at 768)..."
          while [[ "$elapsed" -lt "$MAX_WAIT" ]]; do
            block=$(curl -sf -X POST "${RPC_URL}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              | jq -r '.result // empty' | xargs printf "%d" 2>/dev/null) || block=0
            [[ "$block" -ge "$TARGET_BLOCK" ]] && echo "Block ${block} — span 6 active." && exit 0
            echo "[${elapsed}s] Block: ${block} / ${TARGET_BLOCK}"
            sleep "$POLL_INTERVAL"
            elapsed=$(( elapsed + POLL_INTERVAL ))
          done
          echo "::error::Chain stuck at block ${block} — cannot reach span 6."
          exit 1

      - name: Run Heimdall span and validator-set correctness tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall span/validator-set tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/consensus-correctness/span-validator-set.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall checkpoint chain integrity tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall checkpoint chain integrity tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/consensus-correctness/checkpoint-chain-integrity.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall milestone finality tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall milestone finality tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/consensus-correctness/milestone-finality.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall state-sync event ordering tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall state-sync event ordering tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/consensus-correctness/statesync-event-ordering.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall node health tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall node health tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/consensus-correctness/node-health.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall checkpoint safety tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall checkpoint safety tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/consensus-correctness/checkpoint-safety.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall span-milestone safety tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall span-milestone safety tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/consensus-correctness/span-milestone-safety.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall Bor span-in-turn tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall Bor span-in-turn tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/bor/span-in-turn.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall bridge sync tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall bridge sync tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/clerk/bridge-sync.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall validator-set safety tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall validator-set safety tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/stake/validator-set-safety.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall validator state tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall validator state tests for ${{ matrix.pair_label }}..."
          bats tests/heimdall/stake/validator-state.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Skipped tests summary
        if: ${{ !cancelled() }}
        run: |
          TAP_FILE="/tmp/bats-tap-output.txt"
          {
            echo "## Skipped Tests Summary (${{ matrix.pair_label }})"
            echo ""
            if [[ ! -f "$TAP_FILE" ]]; then
              echo "_No BATS output captured (tests may not have run)._"
            else
              skipped=$(grep '# skip' "$TAP_FILE" || true)
              if [[ -z "$skipped" ]]; then
                echo "All tests ran — none were skipped."
              else
                echo "| Test | Skip Reason |"
                echo "|------|-------------|"
                while IFS= read -r line; do
                  test_name=$(echo "$line" | sed -E 's/^ok [0-9]+ //' | sed -E 's/ # skip.*$//')
                  reason=$(echo "$line" | sed -E 's/.*# skip (.*)/\1/')
                  echo "| ${test_name} | ${reason} |"
                done <<< "$skipped"
                echo ""
                count=$(echo "$skipped" | wc -l)
                echo "**${count} test(s) skipped** — these represent known version incompatibilities, not failures."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # -------------------------------------------------------------------
      # Archive node sync — adds archive node to running staggered-fork
      # enclave and verifies it syncs through all fork boundaries.
      # -------------------------------------------------------------------
      - name: Export genesis and contract artifacts
        run: |
          set -eo pipefail
          ARCHIVE_DIR="kurtosis-pos/.github/configs/archive-sync"
          mkdir -p "$ARCHIVE_DIR"

          kurtosis files inspect "${{ env.ENCLAVE_NAME }}" l2-cl-genesis genesis.json \
            | jq > "${ARCHIVE_DIR}/l2-cl-genesis.json"
          kurtosis files inspect "${{ env.ENCLAVE_NAME }}" l2-el-genesis genesis.json \
            | jq > "${ARCHIVE_DIR}/l2-el-genesis.json"
          kurtosis files inspect "${{ env.ENCLAVE_NAME }}" matic-contract-addresses contractAddresses.json \
            | jq > "${ARCHIVE_DIR}/matic-contract-addresses.json"

          jq '.config.blobSchedule = {"cancun":{"target":3,"max":6,"baseFeeUpdateFraction":3338477}}' \
            "${ARCHIVE_DIR}/l2-el-genesis.json" > "${ARCHIVE_DIR}/l2-el-genesis-patched.json" \
            && mv "${ARCHIVE_DIR}/l2-el-genesis-patched.json" "${ARCHIVE_DIR}/l2-el-genesis.json"

          for f in l2-cl-genesis.json l2-el-genesis.json matic-contract-addresses.json; do
            if [[ ! -s "${ARCHIVE_DIR}/${f}" ]] || [[ "$(jq 'type' "${ARCHIVE_DIR}/${f}" 2>/dev/null)" != '"object"' ]]; then
              echo "::error::Exported file ${f} is empty or invalid."
              exit 1
            fi
          done

      - name: Generate archive-sync params
        run: |
          BOR_ARCHIVE="${{ needs.check-new-release.outputs.bor-archive-image }}"
          BOR_A="${{ matrix.bor_a }}"
          BOR_B="${{ matrix.bor_b }}"
          ERIGON_RPC="${{ matrix.erigon_rpc }}"
          HV2_IMAGE="${{ needs.check-new-release.outputs.heimdall-v2-image }}"

          cat > /tmp/archive-sync-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: archive
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_ARCHIVE}"
          dev:
            should_deploy_l1: false
            l1_rpc_url: http://el-1-geth-lighthouse:8545
            should_deploy_matic_contracts: false
            l2_cl_genesis_filepath: .github/configs/archive-sync/l2-cl-genesis.json
            l2_el_genesis_filepath: .github/configs/archive-sync/l2-el-genesis.json
            matic_contract_addresses_filepath: .github/configs/archive-sync/matic-contract-addresses.json
            existing_participants:
              - kind: validator
                count: 2
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: validator
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_B}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: erigon
                el_image: "${ERIGON_RPC}"
          PARAMS
          cat /tmp/archive-sync-params.yml

      - name: Add archive node to enclave
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/archive-sync-params.yml .
          popd

      - name: Wait for archive node to sync
        run: |
          set -eo pipefail
          ARCHIVE_SERVICE=$(kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}" 2>/dev/null \
            | grep -oE 'l2-el-[0-9]+-bor-heimdall-v2-archive' | head -1)
          if [[ -z "$ARCHIVE_SERVICE" ]]; then
            echo "::error::Could not find archive service in enclave."
            kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"
            exit 1
          fi
          echo "Archive service: ${ARCHIVE_SERVICE}"

          ARCHIVE_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" rpc)"
          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          ARCHIVE_RPC="${ARCHIVE_RPC#http://}" ; ARCHIVE_RPC="${ARCHIVE_RPC#https://}" ; ARCHIVE_RPC="http://${ARCHIVE_RPC}"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}" ; VALIDATOR_RPC="http://${VALIDATOR_RPC}"

          BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"
          base_ver=$(echo "$BOR_MIN_VERSION" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          MIN_BLOCK=576
          if [[ "$(printf '%s\n%s' "$base_ver" "2.7.0" | sort -V | head -1)" == "2.7.0" ]]; then
            MIN_BLOCK=640
          fi

          MAX_WAIT=600; POLL_INTERVAL=10; SYNC_THRESHOLD=5
          elapsed=0; last_archive_block=0; stall_count=0

          while [[ "$elapsed" -lt "$MAX_WAIT" ]]; do
            archive_block=$(curl -sf -X POST "${ARCHIVE_RPC}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              | jq -r '.result' | xargs printf "%d" 2>/dev/null) || archive_block=0
            validator_block=$(curl -sf -X POST "${VALIDATOR_RPC}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              | jq -r '.result' | xargs printf "%d" 2>/dev/null) || validator_block=0
            echo "[${elapsed}s] Archive: ${archive_block} | Validator: ${validator_block}"

            bad_blocks=$(kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null \
              | tail -200 | grep -c "BAD BLOCK" || true)
            if [[ "$bad_blocks" -gt 0 ]]; then
              echo "::error::Archive node BAD BLOCK error."
              kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null \
                | grep -B 2 -A 10 "BAD BLOCK" || true
              exit 1
            fi

            if [[ "$archive_block" -ge "$MIN_BLOCK" && "$validator_block" -gt 0 ]]; then
              gap=$(( validator_block - archive_block ))
              if [[ "$gap" -le "$SYNC_THRESHOLD" && "$gap" -ge 0 ]]; then
                echo "Archive synced! Block ${archive_block} (gap ${gap})."
                exit 0
              fi
            fi

            if [[ "$archive_block" -eq "$last_archive_block" && "$archive_block" -gt 0 ]]; then
              stall_count=$(( stall_count + 1 ))
              if [[ "$stall_count" -ge 6 ]]; then
                echo "::error::Archive stalled at block ${archive_block}."
                kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null | tail -50
                exit 1
              fi
            else
              stall_count=0
            fi
            last_archive_block="$archive_block"
            sleep "$POLL_INTERVAL"
            elapsed=$(( elapsed + POLL_INTERVAL ))
          done
          echo "::error::Archive did not sync within ${MAX_WAIT}s."
          kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null | tail -50
          exit 1

      - name: Dump enclave logs
        if: failure()
        run: kurtosis dump ./dump

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: pos-e2e-dump-forktrans-${{ matrix.pair_label }}-${{ github.run_id }}
          path: ./dump

      - name: Clean up enclave
        if: always()
        run: |
          kurtosis enclave stop "${{ env.ENCLAVE_NAME }}" || true
          kurtosis clean || true

  # ---------------------------------------------------------------------------
  # Job 3: Execution-specs remote — run ethereum/execution-specs against latest
  # bor release via `execute remote`.  Runs after all matrix jobs to maximise
  # available runner resources.
  # ---------------------------------------------------------------------------
  ethereum-exec-specs-remote:
    needs: [check-new-release, pos-execution-specs, pos-fork-transition]
    if: >-
      !cancelled() && (
        (github.event_name == 'schedule' && needs.check-new-release.outputs.should-run == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.run-tests == 'all' || inputs.run-tests == 'ethereum-exec-specs-remote'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 120
    name: ethereum-exec-specs-remote (against latest bor)
    steps:
      - name: Checkout agglayer/e2e
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli jq
          kurtosis analytics disable

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1.7.0
        with:
          cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Checkout kurtosis-pos
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Checkout execution-specs
        uses: actions/checkout@v6
        with:
          repository: ethereum/execution-specs
          ref: ${{ env.EXEC_SPECS_REF }}
          path: execution-specs

      - name: Install execution-specs dependencies
        run: |
          cd execution-specs
          uv sync

      - name: Patch constants.star (Rio+ forks at 256)
        run: |
          CONSTANTS="kurtosis-pos/src/config/constants.star"
          # Rio and all post-Rio forks must activate at >= 256 per bor/heimdall
          # consensus requirement.
          for fork in rio madhugiri madhugiriPro dandeli lisovo lisovoPro giugliano; do
            sed -i -E '/^\s+"'"${fork}"'":/s/[0-9]+/256/' "$CONSTANTS"
          done
          echo "--- Patched EL_HARD_FORK_BLOCKS ---"
          grep -A 20 '^EL_HARD_FORK_BLOCKS' "$CONSTANTS"

      - name: Generate kurtosis params (single-version latest bor)
        run: |
          BOR_LATEST="${{ needs.check-new-release.outputs.bor-latest-image }}"
          HV2_IMAGE="${{ needs.check-new-release.outputs.heimdall-v2-image }}"

          echo "Bor (latest): ${BOR_LATEST}  |  Heimdall-v2: ${HV2_IMAGE}"

          cat > /tmp/pos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 3
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_LATEST}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_LATEST}"
          PARAMS
          cat /tmp/pos-params.yml

      - name: Deploy kurtosis-pos enclave
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/pos-params.yml .
          popd

      - name: Inspect enclave
        run: kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"

      - name: Wait for all forks to activate
        run: |
          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          RPC_URL="http://${VALIDATOR_RPC}"
          TARGET_BLOCK=270
          MAX_WAIT=600
          POLL_INTERVAL=5
          elapsed=0
          echo "Waiting for block ${TARGET_BLOCK} (forks at 256)..."
          while [[ "$elapsed" -lt "$MAX_WAIT" ]]; do
            block=$(curl -sf -X POST "${RPC_URL}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              | jq -r '.result // empty' | xargs printf "%d" 2>/dev/null) || block=0
            [[ "$block" -ge "$TARGET_BLOCK" ]] && echo "Block ${block} — all forks active." && exit 0
            echo "[${elapsed}s] Block: ${block} / ${TARGET_BLOCK}"
            sleep "$POLL_INTERVAL"
            elapsed=$(( elapsed + POLL_INTERVAL ))
          done
          echo "::error::Chain stuck at block ${block}."
          exit 1

      - name: Run execution-specs remote tests
        run: |
          set -eo pipefail
          L2_RPC_SERVICE=$(kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}" 2>/dev/null \
            | grep -oE 'l2-el-[0-9]+-bor-heimdall-v2-rpc' | head -1)
          if [[ -z "$L2_RPC_SERVICE" ]]; then
            echo "::error::Could not find bor RPC service in enclave."
            kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"
            exit 1
          fi
          echo "Bor RPC service: ${L2_RPC_SERVICE}"
          L2_RPC_RAW="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" "${L2_RPC_SERVICE}" rpc)"
          L2_RPC_RAW="${L2_RPC_RAW#http://}" ; L2_RPC_RAW="${L2_RPC_RAW#https://}"
          L2_RPC_URL="http://${L2_RPC_RAW}"
          L2_PRIVATE_KEY="0xd40311b5a5ca5eaeb48dfba5403bde4993ece8eccf4190e98e19fcd4754260ea"
          CHAIN_ID="$(cast chain-id --rpc-url "${L2_RPC_URL}")"

          echo "RPC: ${L2_RPC_URL}  |  Chain ID: ${CHAIN_ID}"

          cd execution-specs
          uv run execute remote \
            --fork=Prague \
            --rpc-endpoint="${L2_RPC_URL}" \
            --rpc-seed-key="${L2_PRIVATE_KEY}" \
            --chain-id="${CHAIN_ID}" \
            --default-max-fee-per-blob-gas=1 \
            --default-max-fee-per-gas=100000000000 \
            --default-max-priority-fee-per-gas=100000000000 \
            --default-gas-price=100000000000 \
            --sender-funding-txs-gas-price=100000000000 \
            --seed-account-sweep-amount=800000000000000000000 \
            --max-tx-per-batch=75 \
            -n 8 \
            -s \
            --tx-wait-timeout=60 \
            -k "not blob and not 4844 and not beacon_root and not mainnet and not genesis_hash_available and not test_selfdestruct_to_precompile and not test_selfdestruct_to_system_contract and not test_dynamic_create2_selfdestruct_collision_multi_tx and not test_extcodehash_of_empty and not test_call_memory_expands_on_early_revert and not type_3 and not address_0x000000000000000000000000000000000000000a and not address_0x000000000000000000000000000000000000000b and not address_0x000000000000000000000000000000000000000c and not address_0x000000000000000000000000000000000000000d and not address_0x000000000000000000000000000000000000000e and not address_0x000000000000000000000000000000000000000f and not address_0x0000000000000000000000000000000000000010 and not address_0x0000000000000000000000000000000000000011 and not test_create_nonce_overflow and not gas_limit_0x07270e00 and not tx_gas_limit_0x07270e00" \
            --ignore=tests/frontier/opcodes/test_calldatacopy.py \
            --ignore=tests/frontier/opcodes/test_dup.py \
            --ignore=tests/frontier/opcodes/test_all_opcodes.py \
            --ignore=tests/frontier/opcodes/test_blockhash.py \
            --ignore=tests/frontier/scenarios/test_scenarios.py \
            --ignore=tests/frontier/validation/test_transaction.py \
            --ignore=tests/frontier/create/test_create_one_byte.py \
            --ignore=tests/frontier/precompiles/test_precompile_absence.py \
            --ignore=tests/homestead/coverage/test_coverage.py \
            --ignore=tests/byzantium/eip197_ec_pairing/test_gas.py \
