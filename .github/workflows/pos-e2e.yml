name: PoS E2E Tests
run-name: PoS E2E tests (${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}) — bor:${{ inputs.bor-latest-image || 'latest release' }}

on:
  schedule:
    # Poll for new bor releases once a day at 06:00 UTC.
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      bor-latest-image:
        description: "Bor image for validators and execution-specs tests. Leave empty to auto-detect from GitHub releases."
        required: false
        type: string
        default: ""
      bor-previous-image:
        description: "Previous major bor image (different major.minor). Leave empty to auto-detect."
        required: false
        type: string
        default: ""
      heimdall-v2-image:
        description: "Heimdall-v2 image. Leave empty to auto-detect from GitHub releases."
        required: false
        type: string
        default: ""
      erigon-image:
        description: "Erigon image. Leave empty to auto-detect from GitHub releases."
        required: false
        type: string
        default: ""
      bor-archive-image:
        description: "Bor image for the archive sync node. Leave empty to use bor-latest. Set to a different version to test cross-version archive sync."
        required: false
        type: string
        default: ""
      bor-compat-versions:
        description: "Comma-separated bor images for pairwise version compat matrix. Leave empty to auto-detect from recent major.minor lines."
        required: false
        type: string
        default: ""
      heimdall-compat-versions:
        description: "Comma-separated heimdall-v2 images for regression matrix (v0.6.0+ only). Leave empty to auto-detect from compat-versions.yml / GitHub releases."
        required: false
        type: string
        default: ""
      kurtosis-pos-ref:
        description: "Tag, branch, or commit of kurtosis-pos to use."
        required: false
        type: string
        default: "feat/execution-specs"
      ethereum-exec-specs-ref:
        description: "Branch or tag of ethereum/execution-specs to use for remote execution tests."
        required: false
        type: string
        default: "forks/amsterdam"
      run-tests:
        description: "Select which test jobs to run (bypasses release detection for the selected jobs)."
        required: false
        type: choice
        default: "all"
        options:
          - all
          - pos-exec-specs
          - fork-trans
          - matrix
          - ethereum-exec-specs-remote
      force-run:
        description: "Run tests even if no new bor release is detected"
        required: false
        type: boolean
        default: false

concurrency:
  group: pos-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  id-token: write

env:
  ENCLAVE_NAME: pos
  POLYCLI_VERSION: v0.1.103
  KURTOSIS_POS_REF: ${{ inputs.kurtosis-pos-ref || 'feat/execution-specs' }}
  EXEC_SPECS_REF: ${{ inputs.ethereum-exec-specs-ref || 'forks/amsterdam' }}
  # Suppress Node.js 20 deprecation warnings from third-party actions
  # (bats-action, setup-uv, etc.). Actions will be forced to Node 24 by
  # default starting June 2nd 2026; opt in early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Resolve bor/heimdall versions and check for new releases.
  # ---------------------------------------------------------------------------
  check-new-release:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.decide.outputs.should-run }}
      bor-tag: ${{ steps.compute.outputs.bor-tag }}
      bor-latest-image: ${{ steps.compute.outputs.bor-latest-image }}
      bor-previous-image: ${{ steps.compute.outputs.bor-previous-image }}
      bor-archive-image: ${{ steps.compute.outputs.bor-archive-image }}
      heimdall-v2-image: ${{ steps.compute.outputs.heimdall-v2-image }}
      erigon-image: ${{ steps.compute.outputs.erigon-image }}
      compat-pairs: ${{ steps.compute.outputs.compat-pairs }}
      fork-trans-pairs: ${{ steps.compute.outputs.fork-trans-pairs }}
    steps:
      - name: Checkout (for compat-versions.yml)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          sparse-checkout: scripts/pos-version-matrix
          sparse-checkout-cone-mode: false

      - name: Install Python deps for compute-release-outputs.py
        run: python3 -m pip install -r scripts/pos-version-matrix/requirements.txt

      - name: Compute release outputs and compat matrix
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BOR_LATEST_IMAGE: ${{ inputs.bor-latest-image }}
          INPUT_BOR_PREVIOUS_IMAGE: ${{ inputs.bor-previous-image }}
          INPUT_HEIMDALL_V2_IMAGE: ${{ inputs.heimdall-v2-image }}
          INPUT_ERIGON_IMAGE: ${{ inputs.erigon-image }}
          INPUT_BOR_ARCHIVE_IMAGE: ${{ inputs.bor-archive-image }}
          INPUT_BOR_COMPAT_VERSIONS: ${{ inputs.bor-compat-versions }}
          INPUT_HEIMDALL_COMPAT_VERSIONS: ${{ inputs.heimdall-compat-versions }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/pos-version-matrix/compute-release-outputs.py

      - name: Check cache for previously tested tag
        if: steps.compute.outputs.bor-tag != 'manual' && steps.compute.outputs.bor-tag != ''
        id: cache-check
        uses: actions/cache@v5
        with:
          path: /tmp/pos-release-cache
          key: pos-e2e-bor-release-${{ steps.compute.outputs.bor-tag }}

      - name: Determine if tests should run
        id: decide
        run: |
          if [[ -z "${{ steps.compute.outputs.bor-tag }}" ]]; then
            echo "No bor tag resolved — skipping."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force-run }}" == "true" ]]; then
            echo "Force-run requested."
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.compute.outputs.bor-tag }}" == "manual" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.cache-check.outputs.cache-hit }}" == "true" ]]; then
            echo "Tag ${{ steps.compute.outputs.bor-tag }} already tested — skipping."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected: ${{ steps.compute.outputs.bor-tag }}"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        run: |
          {
            echo "### PoS E2E Release Check"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Bor latest | \`${{ steps.compute.outputs.bor-latest-image }}\` |"
            echo "| Bor previous | \`${{ steps.compute.outputs.bor-previous-image }}\` |"
            echo "| Bor archive | \`${{ steps.compute.outputs.bor-archive-image }}\` |"
            echo "| Heimdall-v2 | \`${{ steps.compute.outputs.heimdall-v2-image }}\` |"
            echo "| Erigon | \`${{ steps.compute.outputs.erigon-image }}\` |"
            echo "| Should run | \`${{ steps.decide.outputs.should-run }}\` |"
            echo ""
            echo "#### Test Matrix (EL + CL version mixing)"
            echo '${{ steps.compute.outputs.compat-pairs }}' | jq -r '
              if length == 0 then "No compat pairs generated."
              else
                "| Pair | Bor A | Bor B | Heimdall A | Heimdall B | Erigon |",
                "|------|-------|-------|------------|------------|--------|",
                (.[] | "| \(.pair_label) | `\(.bor_a)` | `\(.bor_b)` | `\(.heimdall_a)` | `\(.heimdall_b)` | `\(.erigon_rpc)` |")
              end'
            echo ""
            excluded='${{ steps.compute.outputs.excluded-pairs }}'
            if [[ $(echo "$excluded" | jq 'length') -gt 0 ]]; then
              echo "#### Excluded Pairs (Known Incompatible)"
              echo ""
              echo "| Version A | Version B | Scope | Reason |"
              echo "|-----------|-----------|-------|--------|"
              echo "$excluded" | jq -r '.[] | "| `\(.a)` | `\(.b)` | \(.scope) | \(.reason) |"'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # PoS E2E tests — unified matrix of devnet configurations.
  #
  # Each scenario deploys a mixed-version devnet with bor validators split
  # across versions, a bor RPC, and an erigon cross-client RPC.
  # Staggered fork activation from kurtosis-pos constants.star defaults.
  #
  # Tests: fork-transition (parallel, during fork activation) followed by
  # execution-specs (after all forks active past block 640).
  # ---------------------------------------------------------------------------
  # Job 1: Execution-specs — staggered forks (256–640), stable basefee.
  # ---------------------------------------------------------------------------
  pos-execution-specs:
    needs: check-new-release
    if: >-
      needs.check-new-release.outputs.compat-pairs != '[]' && (
        (github.event_name == 'schedule' && needs.check-new-release.outputs.should-run == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.run-tests == 'all' || inputs.run-tests == 'pos-exec-specs' || inputs.run-tests == 'matrix'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include: ${{ fromJson(needs.check-new-release.outputs.compat-pairs) }}
    name: pos-exec-specs (${{ matrix.pair_label }})
    steps:
      - name: Checkout agglayer/e2e
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli jq
          kurtosis analytics disable

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1.7.0
        with:
          cache: false

      - name: Install bats
        uses: bats-core/bats-action@3.0.0

      - name: Install polycli
        run: |
          tmp_dir=$(mktemp -d)
          curl -sL "https://github.com/0xPolygon/polygon-cli/releases/download/${{ env.POLYCLI_VERSION }}/polycli_${{ env.POLYCLI_VERSION }}_linux_amd64.tar.gz" | tar -xz -C "$tmp_dir"
          mv "$tmp_dir"/* /usr/local/bin/polycli
          rm -rf "$tmp_dir"
          chmod +x /usr/local/bin/polycli
          polycli version

      - name: Checkout kurtosis-pos
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Compute minimum and maximum bor version in the mix
        id: bor-min
        run: |
          ver_a=$(echo "${{ matrix.bor_a }}" | sed 's|.*:||; s/^v//')
          ver_b=$(echo "${{ matrix.bor_b }}" | sed 's|.*:||; s/^v//')
          base_a=$(echo "$ver_a" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          base_b=$(echo "$ver_b" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          min_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | head -1)
          max_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | tail -1)
          echo "bor-min-version=${min_ver}" >> "$GITHUB_OUTPUT"
          echo "bor-max-version=${max_ver}" >> "$GITHUB_OUTPUT"
          echo "Bor version range: ${min_ver} — ${max_ver} (from ${ver_a}, ${ver_b})"

      - name: Patch constants.star (staggered Rio+ schedule, minimum 256)
        env:
          BOR_MIN_VERSION: ${{ steps.bor-min.outputs.bor-min-version }}
        run: scripts/pos-e2e/patch-constants-star.sh

      - name: Generate kurtosis params
        run: |
          BOR_A="${{ matrix.bor_a }}"
          BOR_B="${{ matrix.bor_b }}"
          ERIGON_RPC="${{ matrix.erigon_rpc }}"
          # Heimdall is mixed alongside bor: validators running BOR_A also run
          # HV2_A (majority); validators running BOR_B run HV2_B (minority).
          # Both are equal today (v0.6.0 only) — the split activates when
          # compat-versions.yml carries a second heimdall release.  Fallback to
          # resolve-step heimdall-v2-image if matrix field is missing (backwards
          # compat with pre-fold pipelines).
          HV2_A="${{ matrix.heimdall_a || needs.check-new-release.outputs.heimdall-v2-image }}"
          HV2_B="${{ matrix.heimdall_b || needs.check-new-release.outputs.heimdall-v2-image }}"

          echo "Bor: ${BOR_A} / ${BOR_B}  |  Heimdall: ${HV2_A} / ${HV2_B}  |  Erigon: ${ERIGON_RPC}"

          cat > /tmp/pos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 2
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: validator
                count: 1
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_B}"
                el_type: bor
                el_image: "${BOR_B}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: erigon
                el_image: "${ERIGON_RPC}"
          PARAMS
          cat /tmp/pos-params.yml

      - name: Deploy kurtosis-pos enclave
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/pos-params.yml .
          popd

      - name: Inspect enclave
        run: kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"

      - name: Wait for all forks to activate
        run: |
          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          scripts/pos-e2e/wait-for-block.sh "http://${VALIDATOR_RPC}" 654 900 5 "last fork at 640"

      - name: Run execution-specs tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # Load fork schedule generated by the Patch constants.star step.
          if [[ -f /tmp/fork-schedule.env ]]; then
            echo "Loading fork schedule from /tmp/fork-schedule.env"
            set -a; source /tmp/fork-schedule.env; set +a
          else
            echo "WARNING: /tmp/fork-schedule.env not found — tests will use _setup_fork_env() defaults"
          fi

          echo "Running execution-specs (${{ matrix.pair_label }})..."
          bats \
            tests/pos/execution-specs/protocol/ \
            tests/pos/execution-specs/evm/ \
            tests/pos/execution-specs/transactions/ \
            tests/pos/execution-specs/rpc/ \
            tests/pos/execution-specs/precompiles/ \
            --filter-tags "execution-specs" \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run resilience tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # Load fork schedule generated by the Patch constants.star step.
          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          fi

          echo "Running resilience tests (${{ matrix.pair_label }})..."
          bats \
            tests/pos/execution-specs/resilience/blockstm-parallel-execution-safety.bats \
            tests/pos/execution-specs/resilience/chain-liveness-under-stress.bats \
            tests/pos/execution-specs/resilience/consensus-finality-edge-cases.bats \
            tests/pos/execution-specs/resilience/rpc-node-stability.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Skipped tests summary
        if: ${{ !cancelled() }}
        run: scripts/pos-e2e/summarize-skipped-tests.sh "${{ matrix.pair_label }}"

      - name: Dump enclave logs
        if: failure()
        run: kurtosis dump ./dump

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: pos-e2e-dump-execspecs-${{ matrix.pair_label }}-${{ github.run_id }}
          path: ./dump

      - name: Clean up enclave
        if: always()
        run: |
          kurtosis enclave stop "${{ env.ENCLAVE_NAME }}" || true
          kurtosis clean || true

  # ---------------------------------------------------------------------------
  # Job 2: Fork-transition + archive sync — staggered forks.
  # ---------------------------------------------------------------------------
  pos-fork-transition:
    needs: [check-new-release, pos-execution-specs]
    if: >-
      !cancelled() &&
      needs.check-new-release.outputs.fork-trans-pairs != '[]' && (
        (github.event_name == 'schedule' && needs.check-new-release.outputs.should-run == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.run-tests == 'all' || inputs.run-tests == 'fork-trans' || inputs.run-tests == 'matrix'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include: ${{ fromJson(needs.check-new-release.outputs.fork-trans-pairs) }}
    name: fork-trans (${{ matrix.pair_label }})
    steps:
      - name: Checkout agglayer/e2e
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli jq
          kurtosis analytics disable

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1.7.0
        with:
          cache: false

      - name: Install bats
        uses: bats-core/bats-action@3.0.0

      - name: Install polycli
        run: |
          tmp_dir=$(mktemp -d)
          curl -sL "https://github.com/0xPolygon/polygon-cli/releases/download/${{ env.POLYCLI_VERSION }}/polycli_${{ env.POLYCLI_VERSION }}_linux_amd64.tar.gz" | tar -xz -C "$tmp_dir"
          mv "$tmp_dir"/* /usr/local/bin/polycli
          rm -rf "$tmp_dir"
          chmod +x /usr/local/bin/polycli
          polycli version

      - name: Checkout kurtosis-pos
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Generate kurtosis params (staggered forks)
        run: |
          BOR_A="${{ matrix.bor_a }}"
          BOR_B="${{ matrix.bor_b }}"
          ERIGON_RPC="${{ matrix.erigon_rpc }}"
          # Heimdall mixes alongside bor (see pos-execution-specs for rationale).
          HV2_A="${{ matrix.heimdall_a || needs.check-new-release.outputs.heimdall-v2-image }}"
          HV2_B="${{ matrix.heimdall_b || needs.check-new-release.outputs.heimdall-v2-image }}"

          echo "Bor: ${BOR_A} / ${BOR_B}  |  Heimdall: ${HV2_A} / ${HV2_B}  |  Erigon: ${ERIGON_RPC}"

          cat > /tmp/pos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 2
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: validator
                count: 1
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_B}"
                el_type: bor
                el_image: "${BOR_B}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: erigon
                el_image: "${ERIGON_RPC}"
          PARAMS
          cat /tmp/pos-params.yml

      - name: Compute minimum and maximum bor version in the mix
        id: bor-min
        run: |
          ver_a=$(echo "${{ matrix.bor_a }}" | sed 's|.*:||; s/^v//')
          ver_b=$(echo "${{ matrix.bor_b }}" | sed 's|.*:||; s/^v//')
          base_a=$(echo "$ver_a" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          base_b=$(echo "$ver_b" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          min_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | head -1)
          max_ver=$(printf '%s\n%s' "$base_a" "$base_b" | sort -V | tail -1)
          echo "bor-min-version=${min_ver}" >> "$GITHUB_OUTPUT"
          echo "bor-max-version=${max_ver}" >> "$GITHUB_OUTPUT"
          echo "Bor version range: ${min_ver} — ${max_ver} (from ${ver_a}, ${ver_b})"

      - name: Patch constants.star (staggered Rio+ schedule, minimum 256)
        env:
          BOR_MIN_VERSION: ${{ steps.bor-min.outputs.bor-min-version }}
        run: scripts/pos-e2e/patch-constants-star.sh

      - name: Deploy kurtosis-pos enclave (staggered forks)
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/pos-params.yml .
          popd

      - name: Inspect enclave
        run: kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"

      - name: Run fork-transition tests (parallel)
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # Load fork schedule generated by the Patch constants.star step.
          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          else
            echo "WARNING: /tmp/fork-schedule.env not found — tests will use _setup_fork_env() defaults"
          fi

          total_cpus=$(nproc)
          bats_jobs=$(( total_cpus * 2 / 3 ))
          [[ "$bats_jobs" -lt 1 ]] && bats_jobs=1

          echo "Running fork-transition tests (${bats_jobs} jobs) for ${{ matrix.pair_label }}..."
          bats --jobs "$bats_jobs" tests/pos/execution-specs/fork-transitions/parallel-fork-tests.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run cross-client state root oracle tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"
          export ERIGON_RPC_VERSION=$(echo "${{ matrix.erigon_rpc }}" | sed 's|.*:||; s/^v//')

          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          fi

          echo "Running cross-client state root oracle for ${{ matrix.pair_label }}..."
          bats tests/pos/execution-specs/fork-transitions/cross-client-state-roots.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run fork-boundary state consistency tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"
          export BOR_MAX_VERSION="${{ steps.bor-min.outputs.bor-max-version }}"

          echo "Running fork-boundary state consistency for Bor v${BOR_MIN_VERSION}–${BOR_MAX_VERSION} (pair: ${{ matrix.pair_label }})..."
          bats tests/pos/execution-specs/fork-transitions/fork-state-consistency.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run sprint-boundary fork tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"
          export BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"

          # These tests verify fork+sprint boundary intersection using the staggered
          # fork schedule (same devnet as the other tests in this job). The tests
          # skip individual cases when the fork block is not a sprint boundary, so
          # they are safe to run unconditionally against the staggered devnet.
          if [[ -f /tmp/fork-schedule.env ]]; then
            set -a; source /tmp/fork-schedule.env; set +a
          fi

          echo "Running sprint-boundary fork tests for ${{ matrix.pair_label }}..."
          bats tests/pos/execution-specs/fork-transitions/sprint-boundary-fork-tests.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      # -------------------------------------------------------------------
      # Heimdall-v2 consensus correctness tests — run against the live Heimdall
      # REST API (L2_CL_API_URL) to verify span, checkpoint, milestone, and
      # state-sync invariants independently of Bor.
      #
      # Heimdall span 6 starts at block 768.  The fork-transition tests above
      # wait only to the last fork block (640), so the chain may not have
      # advanced far enough for span/state-sync tests. Wait here to ensure
      # the chain has entered span 6 and state-sync events have been produced.
      # -------------------------------------------------------------------
      - name: Wait for chain to reach span 6 (block 768)
        run: |
          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          scripts/pos-e2e/wait-for-block.sh "http://${VALIDATOR_RPC}" 780 900 5 "span 6 starts at 768"

      - name: Trigger L1→L2 state sync event (deposit on L1)
        # Without an L1 deposit the kurtosis devnet never emits a StateSynced
        # event, so clerk/bridge tests would all skip.  A single depositEther()
        # triggers the event and Heimdall's clerk picks it up within ~60 s.
        env:
          ENCLAVE_NAME: ${{ env.ENCLAVE_NAME }}
        run: scripts/pos-e2e/trigger-state-sync.sh

      - name: Run Heimdall span and validator-set correctness tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall span/validator-set tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/consensus-correctness/span-validator-set.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall checkpoint chain integrity tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall checkpoint chain integrity tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/consensus-correctness/checkpoint-chain-integrity.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall milestone finality tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall milestone finality tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/consensus-correctness/milestone-finality.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall state-sync event ordering tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall state-sync event ordering tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/consensus-correctness/statesync-event-ordering.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall node health tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall node health tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/consensus-correctness/node-health.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall checkpoint safety tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall checkpoint safety tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/consensus-correctness/checkpoint-safety.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall span-milestone safety tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall span-milestone safety tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/consensus-correctness/span-milestone-safety.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall Bor span-in-turn tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall Bor span-in-turn tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/bor/span-in-turn.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall bridge sync tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall bridge sync tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/clerk/bridge-sync.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall validator-set safety tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall validator-set safety tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/stake/validator-set-safety.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Run Heimdall validator state tests
        run: |
          set -eo pipefail
          set -a; source ./tests/.env; set +a
          export BATS_LIB_PATH="$PWD/core/helpers/lib"
          export PROJECT_ROOT="$PWD"
          export ENCLAVE_NAME="${{ env.ENCLAVE_NAME }}"

          echo "Running Heimdall validator state tests for ${{ matrix.pair_label }}..."
          bats tests/pos/heimdall/stake/validator-state.bats \
            2>&1 | tee -a /tmp/bats-tap-output.txt

      - name: Skipped tests summary
        if: ${{ !cancelled() }}
        run: scripts/pos-e2e/summarize-skipped-tests.sh "${{ matrix.pair_label }}"

      # -------------------------------------------------------------------
      # Archive node sync — adds archive node to running staggered-fork
      # enclave and verifies it syncs through all fork boundaries.
      # -------------------------------------------------------------------
      - name: Export genesis and contract artifacts
        run: |
          set -eo pipefail
          ARCHIVE_DIR="kurtosis-pos/.github/configs/archive-sync"
          mkdir -p "$ARCHIVE_DIR"

          kurtosis files inspect "${{ env.ENCLAVE_NAME }}" l2-cl-genesis genesis.json \
            | jq > "${ARCHIVE_DIR}/l2-cl-genesis.json"
          kurtosis files inspect "${{ env.ENCLAVE_NAME }}" l2-el-genesis genesis.json \
            | jq > "${ARCHIVE_DIR}/l2-el-genesis.json"
          kurtosis files inspect "${{ env.ENCLAVE_NAME }}" matic-contract-addresses contractAddresses.json \
            | jq > "${ARCHIVE_DIR}/matic-contract-addresses.json"

          jq '.config.blobSchedule = {"cancun":{"target":3,"max":6,"baseFeeUpdateFraction":3338477}}' \
            "${ARCHIVE_DIR}/l2-el-genesis.json" > "${ARCHIVE_DIR}/l2-el-genesis-patched.json" \
            && mv "${ARCHIVE_DIR}/l2-el-genesis-patched.json" "${ARCHIVE_DIR}/l2-el-genesis.json"

          for f in l2-cl-genesis.json l2-el-genesis.json matic-contract-addresses.json; do
            if [[ ! -s "${ARCHIVE_DIR}/${f}" ]] || [[ "$(jq 'type' "${ARCHIVE_DIR}/${f}" 2>/dev/null)" != '"object"' ]]; then
              echo "::error::Exported file ${f} is empty or invalid."
              exit 1
            fi
          done

      - name: Generate archive-sync params
        run: |
          BOR_ARCHIVE="${{ needs.check-new-release.outputs.bor-archive-image }}"
          BOR_A="${{ matrix.bor_a }}"
          BOR_B="${{ matrix.bor_b }}"
          ERIGON_RPC="${{ matrix.erigon_rpc }}"
          # Mirror the existing_participants' heimdall split (HV2_A for majority
          # + BOR_A group, HV2_B for BOR_B minority).  The newly-added archive
          # node tracks the majority CL (HV2_A) since that is the consensus
          # state its chain data must match.
          HV2_A="${{ matrix.heimdall_a || needs.check-new-release.outputs.heimdall-v2-image }}"
          HV2_B="${{ matrix.heimdall_b || needs.check-new-release.outputs.heimdall-v2-image }}"

          cat > /tmp/archive-sync-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: archive
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: bor
                el_image: "${BOR_ARCHIVE}"
          dev:
            should_deploy_l1: false
            l1_rpc_url: http://el-1-geth-lighthouse:8545
            should_deploy_matic_contracts: false
            l2_cl_genesis_filepath: .github/configs/archive-sync/l2-cl-genesis.json
            l2_el_genesis_filepath: .github/configs/archive-sync/l2-el-genesis.json
            matic_contract_addresses_filepath: .github/configs/archive-sync/matic-contract-addresses.json
            existing_participants:
              - kind: validator
                count: 2
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: validator
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_B}"
                el_type: bor
                el_image: "${BOR_B}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: bor
                el_image: "${BOR_A}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_A}"
                el_type: erigon
                el_image: "${ERIGON_RPC}"
          PARAMS
          cat /tmp/archive-sync-params.yml

      - name: Add archive node to enclave
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/archive-sync-params.yml .
          popd

      - name: Wait for archive node to sync
        run: |
          set -eo pipefail
          ARCHIVE_SERVICE=$(kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}" 2>/dev/null \
            | grep -oE 'l2-el-[0-9]+-bor-heimdall-v2-archive' | head -1)
          if [[ -z "$ARCHIVE_SERVICE" ]]; then
            echo "::error::Could not find archive service in enclave."
            kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"
            exit 1
          fi
          echo "Archive service: ${ARCHIVE_SERVICE}"

          ARCHIVE_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" rpc)"
          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          ARCHIVE_RPC="${ARCHIVE_RPC#http://}" ; ARCHIVE_RPC="${ARCHIVE_RPC#https://}" ; ARCHIVE_RPC="http://${ARCHIVE_RPC}"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}" ; VALIDATOR_RPC="http://${VALIDATOR_RPC}"

          BOR_MIN_VERSION="${{ steps.bor-min.outputs.bor-min-version }}"
          base_ver=$(echo "$BOR_MIN_VERSION" | sed -E 's/(-beta[0-9]*|-rc[0-9]*)$//')
          MIN_BLOCK=576
          if [[ "$(printf '%s\n%s' "$base_ver" "2.7.0" | sort -V | head -1)" == "2.7.0" ]]; then
            MIN_BLOCK=640
          fi

          MAX_WAIT=600; POLL_INTERVAL=10; SYNC_THRESHOLD=5
          elapsed=0; last_archive_block=0; stall_count=0

          while [[ "$elapsed" -lt "$MAX_WAIT" ]]; do
            archive_block=$(curl -sf -X POST "${ARCHIVE_RPC}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              | jq -r '.result' | xargs printf "%d" 2>/dev/null) || archive_block=0
            validator_block=$(curl -sf -X POST "${VALIDATOR_RPC}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              | jq -r '.result' | xargs printf "%d" 2>/dev/null) || validator_block=0
            echo "[${elapsed}s] Archive: ${archive_block} | Validator: ${validator_block}"

            bad_blocks=$(kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null \
              | tail -200 | grep -c "BAD BLOCK" || true)
            if [[ "$bad_blocks" -gt 0 ]]; then
              echo "::error::Archive node BAD BLOCK error."
              kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null \
                | grep -B 2 -A 10 "BAD BLOCK" || true
              exit 1
            fi

            if [[ "$archive_block" -ge "$MIN_BLOCK" && "$validator_block" -gt 0 ]]; then
              gap=$(( validator_block - archive_block ))
              if [[ "$gap" -le "$SYNC_THRESHOLD" && "$gap" -ge 0 ]]; then
                echo "Archive synced! Block ${archive_block} (gap ${gap})."
                exit 0
              fi
            fi

            if [[ "$archive_block" -eq "$last_archive_block" && "$archive_block" -gt 0 ]]; then
              stall_count=$(( stall_count + 1 ))
              if [[ "$stall_count" -ge 6 ]]; then
                echo "::error::Archive stalled at block ${archive_block}."
                kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null | tail -50
                exit 1
              fi
            else
              stall_count=0
            fi
            last_archive_block="$archive_block"
            sleep "$POLL_INTERVAL"
            elapsed=$(( elapsed + POLL_INTERVAL ))
          done
          echo "::error::Archive did not sync within ${MAX_WAIT}s."
          kurtosis service logs "${{ env.ENCLAVE_NAME }}" "${ARCHIVE_SERVICE}" 2>/dev/null | tail -50
          exit 1

      - name: Dump enclave logs
        if: failure()
        run: kurtosis dump ./dump

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: pos-e2e-dump-forktrans-${{ matrix.pair_label }}-${{ github.run_id }}
          path: ./dump

      - name: Clean up enclave
        if: always()
        run: |
          kurtosis enclave stop "${{ env.ENCLAVE_NAME }}" || true
          kurtosis clean || true

  # ---------------------------------------------------------------------------
  # Job 3: Execution-specs remote — run ethereum/execution-specs against latest
  # bor release via `execute remote`.  Runs after all matrix jobs to maximise
  # available runner resources.
  # ---------------------------------------------------------------------------
  ethereum-exec-specs-remote:
    needs: [check-new-release, pos-execution-specs, pos-fork-transition]
    if: >-
      !cancelled() && (
        (github.event_name == 'schedule' && needs.check-new-release.outputs.should-run == 'true') ||
        (github.event_name == 'workflow_dispatch' && (inputs.run-tests == 'all' || inputs.run-tests == 'ethereum-exec-specs-remote'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 120
    name: ethereum-exec-specs-remote (against latest bor)
    steps:
      - name: Checkout agglayer/e2e
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli jq
          kurtosis analytics disable

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1.7.0
        with:
          cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Checkout kurtosis-pos
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Checkout execution-specs
        uses: actions/checkout@v6
        with:
          repository: ethereum/execution-specs
          ref: ${{ env.EXEC_SPECS_REF }}
          path: execution-specs

      - name: Install execution-specs dependencies
        run: |
          cd execution-specs
          uv sync

      - name: Patch constants.star (Rio+ forks at 256)
        run: |
          CONSTANTS="kurtosis-pos/src/config/constants.star"
          # Rio and all post-Rio forks must activate at >= 256 per bor/heimdall
          # consensus requirement.
          for fork in rio madhugiri madhugiriPro dandeli lisovo lisovoPro giugliano; do
            sed -i -E '/^\s+"'"${fork}"'":/s/[0-9]+/256/' "$CONSTANTS"
          done
          echo "--- Patched EL_HARD_FORK_BLOCKS ---"
          grep -A 20 '^EL_HARD_FORK_BLOCKS' "$CONSTANTS"

      - name: Generate kurtosis params (single-version latest bor)
        run: |
          BOR_LATEST="${{ needs.check-new-release.outputs.bor-latest-image }}"
          HV2_IMAGE="${{ needs.check-new-release.outputs.heimdall-v2-image }}"

          echo "Bor (latest): ${BOR_LATEST}  |  Heimdall-v2: ${HV2_IMAGE}"

          cat > /tmp/pos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 3
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_LATEST}"
              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_LATEST}"
          PARAMS
          cat /tmp/pos-params.yml

      - name: Deploy kurtosis-pos enclave
        run: |
          pushd kurtosis-pos
          kurtosis run --enclave "${{ env.ENCLAVE_NAME }}" --args-file /tmp/pos-params.yml .
          popd

      - name: Inspect enclave
        run: kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"

      - name: Wait for all forks to activate
        run: |
          VALIDATOR_RPC="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" l2-el-1-bor-heimdall-v2-validator rpc)"
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}" ; VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          scripts/pos-e2e/wait-for-block.sh "http://${VALIDATOR_RPC}" 270 600 5 "forks at 256"

      - name: Run execution-specs remote tests
        run: |
          set -eo pipefail
          L2_RPC_SERVICE=$(kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}" 2>/dev/null \
            | grep -oE 'l2-el-[0-9]+-bor-heimdall-v2-rpc' | head -1)
          if [[ -z "$L2_RPC_SERVICE" ]]; then
            echo "::error::Could not find bor RPC service in enclave."
            kurtosis enclave inspect "${{ env.ENCLAVE_NAME }}"
            exit 1
          fi
          echo "Bor RPC service: ${L2_RPC_SERVICE}"
          L2_RPC_RAW="$(kurtosis port print "${{ env.ENCLAVE_NAME }}" "${L2_RPC_SERVICE}" rpc)"
          L2_RPC_RAW="${L2_RPC_RAW#http://}" ; L2_RPC_RAW="${L2_RPC_RAW#https://}"
          L2_RPC_URL="http://${L2_RPC_RAW}"
          L2_PRIVATE_KEY="0xd40311b5a5ca5eaeb48dfba5403bde4993ece8eccf4190e98e19fcd4754260ea"
          CHAIN_ID="$(cast chain-id --rpc-url "${L2_RPC_URL}")"

          echo "RPC: ${L2_RPC_URL}  |  Chain ID: ${CHAIN_ID}"

          cd execution-specs
          uv run execute remote \
            --fork=Prague \
            --rpc-endpoint="${L2_RPC_URL}" \
            --rpc-seed-key="${L2_PRIVATE_KEY}" \
            --chain-id="${CHAIN_ID}" \
            --default-max-fee-per-blob-gas=1 \
            --default-max-fee-per-gas=100000000000 \
            --default-max-priority-fee-per-gas=100000000000 \
            --default-gas-price=100000000000 \
            --sender-funding-txs-gas-price=100000000000 \
            --seed-account-sweep-amount=800000000000000000000 \
            --max-tx-per-batch=75 \
            -n 8 \
            -s \
            --tx-wait-timeout=60 \
            -k "not blob and not 4844 and not beacon_root and not mainnet and not genesis_hash_available and not test_selfdestruct_to_precompile and not test_selfdestruct_to_system_contract and not test_dynamic_create2_selfdestruct_collision_multi_tx and not test_extcodehash_of_empty and not test_call_memory_expands_on_early_revert and not type_3 and not address_0x000000000000000000000000000000000000000a and not address_0x000000000000000000000000000000000000000b and not address_0x000000000000000000000000000000000000000c and not address_0x000000000000000000000000000000000000000d and not address_0x000000000000000000000000000000000000000e and not address_0x000000000000000000000000000000000000000f and not address_0x0000000000000000000000000000000000000010 and not address_0x0000000000000000000000000000000000000011 and not test_create_nonce_overflow and not gas_limit_0x07270e00 and not tx_gas_limit_0x07270e00" \
            --ignore=tests/frontier/opcodes/test_calldatacopy.py \
            --ignore=tests/frontier/opcodes/test_dup.py \
            --ignore=tests/frontier/opcodes/test_all_opcodes.py \
            --ignore=tests/frontier/opcodes/test_blockhash.py \
            --ignore=tests/frontier/scenarios/test_scenarios.py \
            --ignore=tests/frontier/validation/test_transaction.py \
            --ignore=tests/frontier/create/test_create_one_byte.py \
            --ignore=tests/frontier/precompiles/test_precompile_absence.py \
            --ignore=tests/homestead/coverage/test_coverage.py \
            --ignore=tests/byzantium/eip197_ec_pairing/test_gas.py \
            --ignore=tests/byzantium/eip196_ec_add_mul/test_gas.py \
            --ignore=tests/london/eip1559_fee_market_change/test_tx_type.py \
            --ignore=tests/london/validation/test_header.py \
            --ignore=tests/cancun/eip4788_beacon_root \
            --ignore=tests/cancun/eip5656_mcopy/test_mcopy_memory_expansion.py \
            --ignore=tests/cancun/eip6780_selfdestruct \
            --ignore=tests/cancun/create/test_create_oog_from_eoa_refunds.py \
            --ignore=tests/cancun/eip1153_tstore/test_basic_tload.py \
